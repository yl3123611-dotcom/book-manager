<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>座位管理</title>
    <link href="/javaex/pc/css/common.css" rel="stylesheet" />
    <link href="/javaex/pc/css/skin/tina.css" rel="stylesheet" />
    <link href="/javaex/pc/css/module-theme.css" rel="stylesheet" />
    <script src="/javaex/pc/lib/jquery-1.7.2.min.js"></script>
    <script src="/javaex/pc/js/javaex.min.js"></script>
    <style>
        body { background-color: #f5f7fa; }
        .main-card {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            margin-bottom: 20px;
        }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #ebeef5;
        }
        .page-title { font-size: 18px; font-weight: bold; color: #303133; }

        /* 操作按钮 */
        .btn-group { display: flex; gap: 10px; }
        .btn-primary {
            background: linear-gradient(135deg, #66b1ff 0%, #409eff 100%);
            color: #fff; border: none; padding: 8px 20px;
            border-radius: 4px; cursor: pointer;
            box-shadow: 0 4px 12px rgba(64,158,255,0.3);
        }
        .btn-primary:hover { opacity: 0.9; }
        .btn-success {
            background: linear-gradient(135deg, #85ce61 0%, #67c23a 100%);
            color: #fff; border: none; padding: 8px 20px;
            border-radius: 4px; cursor: pointer;
        }
        .btn-danger {
            background: #fff; border: 1px solid #f56c6c; color: #f56c6c;
            padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px;
        }
        .btn-danger:hover { background: #f56c6c; color: #fff; }
        .btn-warning {
            background: #fff; border: 1px solid #e6a23c; color: #e6a23c;
            padding: 4px 12px; border-radius: 4px; cursor: pointer; font-size: 12px;
        }
        .btn-warning:hover { background: #e6a23c; color: #fff; }

        /* 筛选区域 */
        .filter-row {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-row select {
            padding: 8px 12px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            min-width: 150px;
        }

        /* 表格 */
        .custom-table { width: 100%; border-collapse: collapse; }
        .custom-table th {
            background-color: #f5f7fa; color: #909399; font-weight: 500;
            padding: 12px 10px; text-align: center; border-bottom: 1px solid #ebeef5;
        }
        .custom-table td {
            padding: 12px 10px; color: #606266; text-align: center;
            border-bottom: 1px solid #ebeef5;
        }
        .custom-table tr:hover td { background-color: #f9fafc; }

        /* 状态标签 */
        .status-free { color: #67c23a; }
        .status-busy { color: #f56c6c; }

        /* 弹窗表单 */
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #606266;
            font-size: 14px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: #409eff;
            outline: none;
        }

        /* 统计卡片 */
        .stat-cards {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            flex: 1;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .stat-card .number {
            font-size: 32px;
            font-weight: bold;
            color: #303133;
        }
        .stat-card .label {
            color: #909399;
            font-size: 14px;
            margin-top: 5px;
        }
        .stat-card.primary .number { color: #409eff; }
        .stat-card.success .number { color: #67c23a; }
        .stat-card.danger .number { color: #f56c6c; }
    </style>
</head>
<body class="module-theme">
<div class="list-content">
    <div class="block">
        <!-- 统计卡片 -->
        <div class="stat-cards">
            <div class="stat-card primary">
                <div class="number" id="totalSeats">0</div>
                <div class="label">总座位数</div>
            </div>
            <div class="stat-card success">
                <div class="number" id="freeSeats">0</div>
                <div class="label">空闲座位</div>
            </div>
            <div class="stat-card danger">
                <div class="number" id="busySeats">0</div>
                <div class="label">使用中</div>
            </div>
        </div>

        <div class="main-card">
            <div class="header-row">
                <div class="page-title">
                    <i class="icon-settings" style="margin-right: 8px; color: #409eff;"></i>座位管理
                </div>
                <div class="btn-group">
                    <button class="btn-primary" onclick="showAddSeatDialog()">
                        <i class="icon-plus"></i> 添加座位
                    </button>
                    <button class="btn-success" onclick="showBatchAddDialog()">
                        <i class="icon-copy"></i> 批量添加
                    </button>
                </div>
            </div>

            <div class="filter-row">
                <select id="filterRoom" onchange="filterByRoom()">
                    <option value="">全部阅览室</option>
                    <option th:each="room : ${rooms}" th:value="${room.name}" th:text="${room.name}"></option>
                </select>
                <select id="filterStatus" onchange="filterByStatus()">
                    <option value="">全部状态</option>
                    <option value="0">空闲</option>
                    <option value="1">使用中</option>
                </select>
            </div>

            <table class="custom-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>座位编号</th>
                        <th>所属阅览室</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="seatTableBody">
                    <tr th:each="seat : ${seats}" th:data-room="${seat.room}" th:data-status="${seat.status}">
                        <td th:text="${seat.id}">1</td>
                        <td th:text="${seat.seatNo}" style="font-weight: bold;">A-001</td>
                        <td th:text="${seat.room}">1号阅览室</td>
                        <td>
                            <span th:if="${seat.status == 0}" class="status-free">● 空闲</span>
                            <span th:if="${seat.status == 1}" class="status-busy">● 使用中</span>
                        </td>
                        <td>
                            <button class="btn-warning"
                                    th:attr="data-id=${seat.id},data-seatno=${seat.seatNo},data-room=${seat.room}"
                                    onclick="editSeat(this)">
                                <i class="icon-pencil"></i> 编辑
                            </button>

                            <button th:if="${seat.status == 1}" class="btn-warning"
                                    th:attr="data-id=${seat.id}"
                                    onclick="forceRelease(this)">
                                <i class="icon-unlock"></i> 强制释放
                            </button>

                            <button class="btn-danger"
                                    th:attr="data-id=${seat.id}"
                                    onclick="deleteSeat(this)">
                                <i class="icon-bin"></i> 删除
                            </button>

                        </td>
                    </tr>
                </tbody>
            </table>

            <div th:if="${#lists.isEmpty(seats)}" style="text-align: center; color: #999; padding: 50px;">
                暂无座位数据
            </div>
        </div>
    </div>
</div>

<!-- 添加座位弹窗 -->
<div id="addSeatDialog" style="display: none; padding: 20px;">
    <div class="form-group">
        <label>座位编号 *</label>
        <input type="text" id="seatNo" placeholder="例如：A-001">
    </div>
    <div class="form-group">
        <label>所属阅览室 *</label>
        <select id="seatRoom">
            <option value="">请选择阅览室</option>
            <option th:each="room : ${rooms}" th:value="${room.name}" th:text="${room.name}"></option>
        </select>
    </div>
</div>

<!-- 批量添加弹窗 -->
<div id="batchAddDialog" style="display: none; padding: 20px;">
    <div class="form-group">
        <label>所属阅览室 *</label>
        <select id="batchRoom">
            <option value="">请选择阅览室</option>
            <option th:each="room : ${rooms}" th:value="${room.name}" th:text="${room.name}"></option>
        </select>
    </div>
    <div class="form-group">
        <label>座位前缀 *</label>
        <input type="text" id="batchPrefix" placeholder="例如：A-">
    </div>
    <div class="form-group">
        <label>起始编号 *</label>
        <input type="number" id="batchStart" value="1" min="1">
    </div>
    <div class="form-group">
        <label>添加数量 *</label>
        <input type="number" id="batchCount" value="10" min="1" max="100">
    </div>
    <p style="color: #909399; font-size: 12px;">
        预览：将生成 <span id="previewText">A-001 ~ A-010</span>
    </p>
</div>

<!-- 编辑座位弹窗 -->
<div id="editSeatDialog" style="display: none; padding: 20px;">
    <input type="hidden" id="editSeatId">
    <div class="form-group">
        <label>座位编号 *</label>
        <input type="text" id="editSeatNo">
    </div>
    <div class="form-group">
        <label>所属阅览室 *</label>
        <select id="editSeatRoom">
            <option value="">请选择阅览室</option>
            <option th:each="room : ${rooms}" th:value="${room.name}" th:text="${room.name}"></option>
        </select>
    </div>
</div>

<script>
    // ===== 工具：获取当前弹窗的根节点（兼容 javaex 不同版本的 DOM 包裹方式）=====
    function getDlgRoot() {
        // 某些版本会给弹窗加 [javaex-dialog]
        var $root = $('[javaex-dialog]');
        if ($root.length) return $root;

        // 兜底：找可见的 ex-dialog
        var $ex = $('.ex-dialog:visible').last();
        if ($ex.length) return $ex;

        // 再兜底：直接返回 body（避免空指针）
        return $(document.body);
    }

    // ===== padStart 兼容（即使你说不是浏览器问题，也建议保留，避免脚本中断）=====
    function padLeft(str, len, ch) {
        str = String(str);
        ch = ch || '0';
        while (str.length < len) str = ch + str;
        return str;
    }

    // 统计座位数量
    $(function() {
        updateStats();

        // 页面上筛选/预览输入的监听（注意：弹窗里的输入监听要在弹窗打开后再绑）
        $('#batchPrefix, #batchStart, #batchCount').on('input', updatePreview);
    });

    function updateStats() {
        var total = $('#seatTableBody tr').length;
        var free = $('#seatTableBody tr[data-status="0"]').length;
        var busy = $('#seatTableBody tr[data-status="1"]').length;
        $('#totalSeats').text(total);
        $('#freeSeats').text(free);
        $('#busySeats').text(busy);
    }

    function updatePreview() {
        var prefix = $('#batchPrefix').val() || 'A-';
        var start = parseInt($('#batchStart').val(), 10) || 1;
        var count = parseInt($('#batchCount').val(), 10) || 10;
        var end = start + count - 1;
        $('#previewText').text(prefix + padLeft(start, 3, '0') + ' ~ ' + prefix + padLeft(end, 3, '0'));
    }

    function filterByRoom() {
        filterTable($('#filterRoom').val(), $('#filterStatus').val());
    }

    function filterByStatus() {
        filterTable($('#filterRoom').val(), $('#filterStatus').val());
    }

    function filterTable(room, status) {
        $('#seatTableBody tr').each(function() {
            var rowRoom = $(this).data('room');
            var rowStatus = $(this).data('status').toString();
            var showRoom = (room === '' || rowRoom === room);
            var showStatus = (status === '' || rowStatus === status);
            $(this).toggle(showRoom && showStatus);
        });
    }

    // ===================== 添加座位 =====================
    function showAddSeatDialog() {
        // 这里不再用 javaex.dialog(type:"confirm")，改用 javaex.confirm
        javaex.confirm({
            title: "添加座位",
            content: $("#addSeatDialog").html(),
            confirmName: "确定添加",
            cancelName: "取消",
            callback: "doAddSeat()"
        });
    }

    function doAddSeat() {
        var $dlg = getDlgRoot();
        var seatNo = $dlg.find('#seatNo').val();
        var room = $dlg.find('#seatRoom').val();

        if (!seatNo) {
            javaex.optTip({ content: "请输入座位编号", type: "error" });
            return false;
        }
        if (!room) {
            javaex.optTip({ content: "请选择阅览室", type: "error" });
            return false;
        }

        $.ajax({
            url: '/seat/admin/addSeat',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ seatNo: seatNo, room: room }),
            success: function(res) {
                if (res.code == 200) {
                    javaex.optTip({ content: "添加成功", type: "success" });
                    setTimeout(function() { window.location.reload(); }, 800);
                } else {
                    javaex.optTip({ content: res.msg || "添加失败", type: "error" });
                }
            }
        });

        // confirm 回调里返回 false，通常可以避免弹窗立即关闭（不同版本行为略有差异）
        return false;
    }

    // ===================== 批量添加 =====================
    function showBatchAddDialog() {
        javaex.confirm({
            title: "批量添加座位",
            content: $("#batchAddDialog").html(),
            confirmName: "确定添加",
            cancelName: "取消",
            callback: "doBatchAdd()"
        });

        // 弹窗内容渲染后再绑定输入监听
        setTimeout(function() {
            var $dlg = getDlgRoot();
            // 初始化预览
            var prefix = $dlg.find('#batchPrefix').val() || 'A-';
            var start = parseInt($dlg.find('#batchStart').val(), 10) || 1;
            var count = parseInt($dlg.find('#batchCount').val(), 10) || 10;
            var end = start + count - 1;
            $dlg.find('#previewText').text(prefix + padLeft(start, 3, '0') + ' ~ ' + prefix + padLeft(end, 3, '0'));

            $dlg.find('#batchPrefix, #batchStart, #batchCount').on('input', function() {
                var p = $dlg.find('#batchPrefix').val() || 'A-';
                var s = parseInt($dlg.find('#batchStart').val(), 10) || 1;
                var c = parseInt($dlg.find('#batchCount').val(), 10) || 10;
                var e = s + c - 1;
                $dlg.find('#previewText').text(p + padLeft(s, 3, '0') + ' ~ ' + p + padLeft(e, 3, '0'));
            });
        }, 30);
    }

    function doBatchAdd() {
        var $dlg = getDlgRoot();
        var room = $dlg.find('#batchRoom').val();
        var prefix = $dlg.find('#batchPrefix').val();
        var start = $dlg.find('#batchStart').val();
        var count = $dlg.find('#batchCount').val();

        if (!room) {
            javaex.optTip({ content: "请选择阅览室", type: "error" });
            return false;
        }
        if (!prefix) {
            javaex.optTip({ content: "请输入座位前缀", type: "error" });
            return false;
        }

        $.post('/seat/admin/batchAddSeat', {
            room: room,
            prefix: prefix,
            startNo: start,
            count: count
        }, function(res) {
            if (res.code == 200) {
                javaex.optTip({ content: res.msg, type: "success" });
                setTimeout(function() { window.location.reload(); }, 800);
            } else {
                javaex.optTip({ content: res.msg || "添加失败", type: "error" });
            }
        });

        return false;
    }

    // ===================== 编辑座位 =====================
    var editingSeatId = 0;

    function editSeat(btn) {
        // dataset 你用 Chrome 没问题，这里也给你更稳的 attr 写法（不依赖 dataset）
        editingSeatId = $(btn).attr("data-id");
        var seatNo = $(btn).attr("data-seatno");
        var room = $(btn).attr("data-room");

        javaex.confirm({
            title: "编辑座位",
            content: $("#editSeatDialog").html(),
            confirmName: "保存",
            cancelName: "取消",
            callback: "doEditSeat()"
        });

        setTimeout(function() {
            var $dlg = getDlgRoot();
            $dlg.find('#editSeatNo').val(seatNo);
            $dlg.find('#editSeatRoom').val(room);
        }, 30);
    }

    function doEditSeat() {
        var $dlg = getDlgRoot();
        var seatNo = $dlg.find('#editSeatNo').val();
        var room = $dlg.find('#editSeatRoom').val();

        if (!seatNo) {
            javaex.optTip({ content: "请输入座位编号", type: "error" });
            return false;
        }
        if (!room) {
            javaex.optTip({ content: "请选择阅览室", type: "error" });
            return false;
        }

        $.ajax({
            url: '/seat/admin/updateSeat',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ id: editingSeatId, seatNo: seatNo, room: room }),
            success: function(res) {
                if (res.code == 200) {
                    javaex.optTip({ content: "更新成功", type: "success" });
                    setTimeout(function() { window.location.reload(); }, 800);
                } else {
                    javaex.optTip({ content: res.msg || "更新失败", type: "error" });
                }
            }
        });

        return false;
    }

    // ===================== 删除座位 =====================
    var deletingSeatId = 0;

    function deleteSeat(btn) {
        deletingSeatId = $(btn).attr("data-id");
        javaex.confirm({
            content: "确定要删除该座位吗？此操作不可恢复！",
            callback: "doDeleteSeat()"
        });
    }

    function doDeleteSeat() {
        $.post('/seat/admin/deleteSeat', { id: deletingSeatId }, function(res) {
            if (res.code == 200) {
                javaex.optTip({ content: "删除成功", type: "success" });
                setTimeout(function() { window.location.reload(); }, 800);
            } else {
                javaex.optTip({ content: res.msg || "删除失败", type: "error" });
            }
        });
    }

    // ===================== 强制释放 =====================
    var releasingSeatId = 0;

    function forceRelease(btn) {
        releasingSeatId = $(btn).attr("data-id");
        javaex.confirm({
            content: "确定要强制释放该座位吗？这将结束当前用户的预约！",
            callback: "doForceRelease()"
        });
    }

    function doForceRelease() {
        $.post('/seat/admin/forceRelease', { seatId: releasingSeatId }, function(res) {
            if (res.code == 200) {
                javaex.optTip({ content: "座位已释放", type: "success" });
                setTimeout(function() { window.location.reload(); }, 800);
            } else {
                javaex.optTip({ content: res.msg || "操作失败", type: "error" });
            }
        });
    }
</script>


</body>
</html>
