<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <link href="/javaex/pc/css/common.css" rel="stylesheet" />
    <link href="/javaex/pc/css/skin/tina.css" rel="stylesheet" />
    <link href="/javaex/pc/css/module-theme.css" rel="stylesheet" />
    <script src="/javaex/pc/lib/jquery-1.7.2.min.js"></script>
    <script src="/javaex/pc/js/javaex.min.js"></script>
    <title>座位时间段配额</title>
    <style>
        body{background:#f5f7fa;padding:12px;}
        .card{background:#fff;border-radius:8px;padding:16px;}
        .row{display:flex;gap:10px;align-items:center;margin-bottom:10px;}
        input.text{height:34px;}
    </style>
</head>
<body class="module-theme">
<div class="card">
    <h2>座位时段配额管理</h2>

    <div class="row">
        <input id="quotaId" type="hidden">
        <label for="slotDate">预约日期</label>
        <input id="slotDate" type="date" class="text" style="width:170px;">

        <label for="slotStart">开始时间</label>
        <input id="slotStart" type="datetime-local" class="text" style="width:220px;">

        <label for="slotEnd">结束时间</label>
        <input id="slotEnd" type="datetime-local" class="text" style="width:220px;">

        <label for="room">阅览室</label>
        <input id="room" class="text" placeholder="例如：1号阅览室" style="width:160px;">

        <label for="maxCount">配额上限</label>
        <input id="maxCount" class="text" placeholder="最大预约数" style="width:120px;">

        <button class="button green" onclick="save()" id="saveBtn">新增配额</button>
        <button class="button empty" onclick="resetForm()">清空</button>
        <a class="button blue empty" href="javascript:parent.page('seat/seat-rule-config');">返回规则</a>
    </div>

    <table class="table color2">
        <thead>
        <tr align="center">
            <th>预约日期</th>
            <th>开始时间</th>
            <th>结束时间</th>
            <th>阅览室</th>
            <th>已预约</th>
            <th>配额上限</th>
            <th style="width:120px;">操作</th>
        </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

    <div style="margin-top:10px;color:#999;">
        请选择日期和时间，系统将按 yyyy-MM-dd HH:mm:ss 格式提交。
    </div>
</div>

<script>
    var quotaCache = [];

    $(function(){
        var now = new Date();
        var y = now.getFullYear();
        var m = String(now.getMonth() + 1).padStart(2, '0');
        var d = String(now.getDate()).padStart(2, '0');
        $('#slotDate').val(y + '-' + m + '-' + d);
        load();
    });

    function normalizeDateTime(s){
        if(!s) return '';
        var v = String(s);
        if(v.length >= 19) return v.substring(0, 19).replace('T', ' ');
        return v.replace('T', ' ');
    }

    function toServerDateTime(localVal){
        if(!localVal) return '';
        var v = String(localVal).trim();
        if(v.indexOf('T') < 0) return v;
        if(v.length === 16) return v.replace('T', ' ') + ':00';
        if(v.length >= 19) return v.substring(0, 19).replace('T', ' ');
        return v.replace('T', ' ');
    }

    function toLocalDateTime(serverVal){
        if(!serverVal) return '';
        var v = String(serverVal).trim().replace(' ', 'T');
        if(v.length >= 19){
            return v.substring(0, 16);
        }
        return v;
    }

    function resetForm(){
        $('#quotaId').val('');
        $('#slotStart').val('');
        $('#slotEnd').val('');
        $('#room').val('');
        $('#maxCount').val('');
        $('#saveBtn').text('新增配额');
    }

    function load(){
        $.get('/seat/rule/quota/list', function(res){
            if(res.code!==200) return;
            var list=res.data||[];
            quotaCache = list;
            var html='';
            $.each(list, function(i, q){
                html += "<tr align='center'>";
                html += "<td>"+(q.slotDate||'')+"</td>";
                html += "<td>"+normalizeDateTime(q.slotStart)+"</td>";
                html += "<td>"+normalizeDateTime(q.slotEnd)+"</td>";
                html += "<td>"+(q.room||'')+"</td>";
                html += "<td>"+(q.reservedCount==null?0:q.reservedCount)+"</td>";
                html += "<td>"+(q.maxCount==null?0:q.maxCount)+"</td>";
                html += "<td>";
                html += "<button class='button blue empty' onclick='editQuotaByIndex("+ i +")'>编辑</button> ";
                html += "<button class='button red empty' onclick='del("+q.id+")'>删除</button>";
                html += "</td>";
                html += "</tr>";
            });
            $('#tbody').html(html);
        });
    }

    function editQuotaByIndex(i){
        var q = quotaCache[i] || {};
        $('#quotaId').val(q.id || '');
        $('#slotDate').val((q.slotDate || '').substring(0, 10));
        $('#slotStart').val(toLocalDateTime(q.slotStart));
        $('#slotEnd').val(toLocalDateTime(q.slotEnd));
        $('#room').val(q.room || '');
        $('#maxCount').val(q.maxCount == null ? '' : q.maxCount);
        $('#saveBtn').text('更新配额');
    }

    function save(){
        var quotaId = $('#quotaId').val();
        var slotDate = $('#slotDate').val();
        var slotStart = toServerDateTime($('#slotStart').val());
        var slotEnd = toServerDateTime($('#slotEnd').val());
        var room = $('#room').val();
        var maxCount = parseInt($('#maxCount').val()||'0', 10);

        if(!slotDate){
            javaex.message({content:'请选择预约日期', type:'error'});
            return;
        }
        if(!slotStart || !slotEnd){
            javaex.message({content:'请选择开始和结束时间', type:'error'});
            return;
        }
        if(slotStart >= slotEnd){
            javaex.message({content:'结束时间必须晚于开始时间', type:'error'});
            return;
        }
        if(!room){
            javaex.message({content:'请输入阅览室名称', type:'error'});
            return;
        }
        if(isNaN(maxCount) || maxCount <= 0){
            javaex.message({content:'配额上限必须大于0', type:'error'});
            return;
        }

        var data = {
            id: quotaId ? parseInt(quotaId, 10) : null,
            slotDate: slotDate,
            slotStart: slotStart,
            slotEnd: slotEnd,
            room: room,
            maxCount: maxCount
        };

        $.ajax({
            url:'/seat/rule/quota/save',
            type:'POST',
            contentType:'application/json;charset=UTF-8',
            data: JSON.stringify(data),
            success:function(res){
                if(res.code===200){
                    javaex.message({content: quotaId ? '更新成功' : '保存成功', type:'success'});
                    resetForm();
                    load();
                }
                else{ javaex.message({content:res.msg||'保存失败', type:'error'}); }
            },
            error:function(xhr){
                javaex.message({content:'请求失败：' + (xhr.status || '') + ' ' + (xhr.statusText || ''), type:'error'});
            }
        });
    }

    function del(id){
        $.post('/seat/rule/quota/delete', {id:id}, function(res){
            if(res.code===200){ javaex.message({content:'删除成功', type:'success'}); load(); }
            else{ javaex.message({content:res.msg||'删除失败', type:'error'}); }
        });
    }
</script>
</body>
</html>
