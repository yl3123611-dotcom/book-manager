<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>
<head>
<meta charset="utf-8">
<link href="../../javaex/pc/css/icomoon.css" rel="stylesheet" />
<link href="../../javaex/pc/css/animate.css" rel="stylesheet" />
<link href="../../javaex/pc/css/common.css" rel="stylesheet" />
<link href="../../javaex/pc/css/skin/tina.css" rel="stylesheet" />
<link href="../../javaex/pc/css/module-theme.css" rel="stylesheet" />
<script src="../../javaex/pc/lib/jquery-1.7.2.min.js"></script>
<script src="../../javaex/pc/js/common.js"></script>
<script src="../../javaex/pc/js/javaex.min.js"></script>
<script src="../../javaex/pc/js/javaex-formVerify.js"></script>
<title>编辑读者</title>
<style>
    body { background-color: #f0f2f5; padding: 20px; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
    .block { background: #fff; padding: 40px 60px; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.06); min-height: 600px; }
    .banner { border-bottom: 1px solid #f0f0f0; margin-bottom: 30px; padding-bottom: 16px; }
    .banner .tab.fixed { font-size: 18px; font-weight: 600; color: #333; border-left: none; padding-left: 0; display: inline-block; }
    .banner .tab.fixed::before { content: ''; display: inline-block; width: 4px; height: 18px; background: #1890ff; margin-right: 8px; border-radius: 2px; vertical-align: text-bottom; }
    .unit { margin: 20px 0; }
    .unit .left { width: 100px !important; text-align: right; font-weight: 500; color: #333; line-height: 36px; }
    .unit .right { width: 500px; }
    .action-row { margin-top: 34px; margin-left: 120px; }
    .action-row .button { width: 120px; margin-right: 14px; }
</style>
</head>
<body class="module-theme">
<div class="list-content">
    <div class="block">
        <div class="banner">
            <p class="tab fixed">编辑读者信息</p>
        </div>

        <div class="main">
            <form id="form">
                <div class="unit clear">
                    <div class="left"><span class="required">*</span><p class="subtitle">昵称</p></div>
                    <div class="right"><input type="text" class="text" id="nickname" name="nickname"/></div>
                </div>

                <div class="unit clear">
                    <div class="left"><span class="required">*</span><p class="subtitle">用户名</p></div>
                    <div class="right"><input type="text" class="text" id="username" name="username"/></div>
                </div>

                <div class="unit clear">
                    <div class="left"><span class="required">*</span><p class="subtitle">密码</p></div>
                    <div class="right"><input type="password" class="text" id="password" name="password"/></div>
                </div>

                <div class="unit clear">
                    <div class="left"><p class="subtitle">生日</p></div>
                    <div class="right"><input type="date" class="text" id="birthday" name="birthday"/></div>
                </div>

                <div class="unit clear">
                    <div class="left"><p class="subtitle">电话</p></div>
                    <div class="right"><input type="text" class="text" id="tel" name="tel"/></div>
                </div>

                <div class="unit clear">
                    <div class="left"><p class="subtitle">身份</p></div>
                    <div class="right">
                        <select id="select">
                            <option value="0">学生</option>
                            <option value="1">教师</option>
                            <option value="2">校外人士</option>
                        </select>
                    </div>
                </div>

                <div class="unit clear">
                    <div class="left"><p class="subtitle">邮箱</p></div>
                    <div class="right"><input type="text" class="text" id="email" name="email"/></div>
                </div>

                <div class="unit clear">
                    <div class="left"><p class="subtitle">地址</p></div>
                    <div class="right"><input type="text" class="text" id="address" name="address"/></div>
                </div>

                <div class="unit clear">
                    <div class="left"><p class="subtitle">可借数量</p></div>
                    <div class="right"><input type="number" min="1" class="text" id="size" name="size"/></div>
                </div>

                <div class="action-row">
                    <input type="button" id="return" class="button no" value="返回" />
                    <input type="button" id="save" class="button yes" value="保存" />
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    javaex.select({ id : "select", isSearch : false });

    $(document).ready(function(){
        var id = getQueryVariable("id");
        if (!id) {
            javaex.message({ content : "参数缺失", type : "error" });
            return;
        }

        $.get("/user/detail", {"id": id}, function(data){
            if (!(data && data.code === 200 && data.data)) {
                javaex.message({ content : (data && data.msg) || "读取失败", type : "error" });
                return;
            }

            var user = data.data;
            $("#nickname").val(user.nickname || "");
            $("#username").val(user.username || "");
            $("#password").val(user.password || "");
            $("#birthday").val((user.birth || "").substring(0,10));
            $("#tel").val(user.tel || "");
            $("#email").val(user.email || "");
            $("#address").val(user.address || "");
            $("#size").val(user.size || 1);

            // 先设置原生 select，再让 javaex 重新渲染显示值
            $("#select").val(String(user.identity == null ? 0 : user.identity));
            javaex.render();
        });
    });

    $("#save").click(function() {
        var id = getQueryVariable("id");
        var nickname = $.trim($("#nickname").val());
        var username = $.trim($("#username").val());
        var password = $("#password").val();
        var birthday = $("#birthday").val();
        var tel = $.trim($("#tel").val());
        var email = $.trim($("#email").val());
        var address = $.trim($("#address").val());
        var size = parseInt($("#size").val(), 10);
        var identity = parseInt($("#select").val(), 10);

        if (nickname === "" || nickname.length > 12) {
            javaex.message({ content : "昵称不能为空且长度不能大于12", type : "error" });
            return false;
        }
        if (username === "" || username.length > 12) {
            javaex.message({ content : "用户名不能为空且长度不能大于12", type : "error" });
            return false;
        }
        if (password === "" || password.length > 18) {
            javaex.message({ content : "密码不能为空且长度不能大于18", type : "error" });
            return false;
        }
        if (!size || size <= 0) {
            javaex.message({ content : "可借数量必须大于0", type : "error" });
            return false;
        }

        var json = {
            "id": id,
            "nickname": nickname,
            "username": username,
            "password": password,
            "birthday": birthday,
            "tel": tel,
            "email": email,
            "address": address,
            "size": size,
            "identity": identity,
            "isAdmin": 1
        };

        $.ajax({
            type : "POST",
            contentType: "application/json;charset=UTF-8",
            url : "/user/update",
            data : JSON.stringify(json),
            success : function(result) {
                if (result.code == 200) {
                    javaex.message({ content : "修改成功", type : "success" });
                    setTimeout(function(){window.location.href="/reader/reader-list";}, 1000);
                } else {
                    javaex.message({ content : result.msg || "修改失败", type : "error" });
                }
            },
            error : function(e){
                javaex.message({ content : "提交失败: " + e.status, type : "error" });
            }
        });
    });

    $("#return").click(function() {
        window.location.href="/reader/reader-list";
    });

    function getQueryVariable(variable){
        var query = window.location.search.substring(1);
        var vars = query.split("&");
        for (var i=0; i<vars.length; i++) {
            var pair = vars[i].split("=");
            if(pair[0] == variable){
                return decodeURIComponent(pair[1]);
            }
        }
        return "";
    }
</script>
</body>
</html>
