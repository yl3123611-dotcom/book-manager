<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link href="../javaex/pc/css/common.css" rel="stylesheet" />
    <link href="../javaex/pc/css/skin/tina.css" rel="stylesheet" />
    <link href="../javaex/pc/css/module-theme.css" rel="stylesheet" />
    <script src="../javaex/pc/lib/jquery-1.7.2.min.js"></script>
    <script src="../javaex/pc/js/javaex.min.js"></script>
    <title>我的用户画像</title>
    <style>
        body { background-color: #f0f2f5; padding: 20px; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }

        .breadcrumb { margin-bottom: 16px; color: #595959; }
        .breadcrumb span { margin: 0 4px; }
        .breadcrumb .active { color: #1890ff; font-weight: 500; }

        .block {
            background: #fff;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.06);
            border: none;
            min-height: 600px;
        }
        .block-header {
            margin-bottom: 30px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e8e8e8;
        }
        .block-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            display: flex;
            align-items: center;
        }
        .block-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 18px;
            background: #1890ff;
            margin-right: 8px;
            border-radius: 2px;
        }

        .profile-container { max-width: 800px; margin: 0 auto; }

        .row { display: flex; align-items: center; margin-bottom: 20px; }
        .k { width: 140px; color: #595959; font-weight: 500; text-align: right; margin-right: 16px; }
        .v { flex: 1; color: #333; }

        input.text {
            height: 36px; padding: 0 12px; border: 1px solid #d9d9d9; border-radius: 4px;
            transition: all 0.3s; width: 100%; max-width: 400px;
        }
        input.text:focus { border-color: #40a9ff; outline: none; box-shadow: 0 0 0 2px rgba(24,144,255,0.2); }

        .hint { color: #8c8c8c; font-size: 14px; margin-top: 10px; background: #fafafa; padding: 20px; border-radius: 4px; }

        .btn-group { margin-left: 156px; margin-top: 24px; display: flex; gap: 12px; }
        .button { padding: 0 20px; height: 36px; line-height: 34px; border-radius: 4px; }
    </style>
</head>
<body class="module-theme">
<div class="breadcrumb">
    <span>用户中心</span>
    <span>/</span>
    <span class="active">我的用户画像</span>
</div>

<div class="block">
    <div class="block-header">
        <div class="block-title">我的用户画像</div>
    </div>

    <div class="profile-container">
        <div class="row">
            <div class="k">年级 (Grade)</div>
            <div class="v"><input id="grade" class="text" placeholder="例如：大三"/></div>
        </div>
        <div class="row">
            <div class="k">专业 (Major)</div>
            <div class="v"><input id="majors" class="text" placeholder="例如：计算机科学与技术"/></div>
        </div>
        <div class="row">
            <div class="k">兴趣 (Interests)</div>
            <div class="v"><input id="interests" class="text" placeholder="例如：历史, 科幻, Java (逗号分隔)"/></div>
        </div>

        <div class="btn-group">
            <button class="button blue" onclick="saveEditable()">保存基本信息</button>
            <button class="button green" onclick="recompute()">重新计算画像</button>
        </div>

        <div style="margin-top: 30px; border-top: 1px solid #f0f0f0; padding-top: 20px;">
            <h4 style="margin-bottom: 20px; color: #333;">画像分析结果</h4>
            <div id="content" class="hint">正在加载画像数据...</div>
        </div>
    </div>
</div>

<script>
    function render(p){
        if(!p){ $('#content').html('<div class="hint">暂无画像数据</div>'); return; }
        $('#grade').val(p.grade||'');
        $('#majors').val(p.majors||'');
        $('#interests').val(p.interests||'');
        var html='';
        html += "<div class='row'><div class='k'>活跃度(activeScore)</div><div class='v'>"+(p.activeScore==null?0:p.activeScore)+"</div></div>";
        html += "<div class='row'><div class='k'>偏好分类(favoriteCategories)</div><div class='v'>"+(p.favoriteCategories||'-')+"</div></div>";
        html += "<div class='row'><div class='k'>逾期率(overdueRate)</div><div class='v'>"+(p.overdueRate==null?0:p.overdueRate)+"</div></div>";
        html += "<div class='row'><div class='k'>更新时间(updatedAt)</div><div class='v'>"+(p.updatedAt||'-')+"</div></div>";
        $('#content').html(html);
    }

    function load(){
        $.get('/profile/my/get', function(res){
            if(res.code!==200){ javaex.message({content:res.msg||'加载失败', type:'error'}); return; }
            render(res.data);
        });
    }

    function recompute(){
        $.post('/profile/my/recompute', {}, function(res){
            if(res.code===200){ javaex.message({content:'已重新计算', type:'success'}); render(res.data); }
            else{ javaex.message({content:res.msg||'失败', type:'error'}); }
        });
    }

    function saveEditable(){
        $.post('/profile/my/save', {
            grade: $('#grade').val(),
            majors: $('#majors').val(),
            interests: $('#interests').val()
        }, function(res){
            if(res.code===200){ javaex.message({content:'保存成功', type:'success'}); render(res.data); }
            else{ javaex.message({content:res.msg||'保存失败', type:'error'}); }
        });
    }

    $(function(){ load(); });
</script>
</body>
</html>
