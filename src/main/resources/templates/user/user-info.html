<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>个人信息</title>
	<link href="/javaex/pc/css/common.css" rel="stylesheet" />
	<link href="/javaex/pc/css/skin/tina.css" rel="stylesheet" />
	<script src="/javaex/pc/lib/jquery-1.7.2.min.js"></script>
	<script src="/javaex/pc/js/javaex.min.js"></script>

	<style>
		body { background-color: #f5f7fa; }
		.layout-container {
			display: flex;
			gap: 20px;
			padding: 20px;
			max-width: 1000px;
			margin: 0 auto;
		}
		.profile-card {
			width: 300px;
			background: #fff;
			border-radius: 8px;
			box-shadow: 0 2px 12px rgba(0,0,0,0.04);
			text-align: center;
			padding-bottom: 30px;
			overflow: hidden;
		}
		.card-header-bg {
			height: 100px;
			background: linear-gradient(135deg, #a0cfff 0%, #409eff 100%);
		}
		.avatar-wrapper {
			margin-top: -50px;
			position: relative;
			display: inline-block;
		}
		.avatar-img {
			width: 100px; height: 100px; border-radius: 50%;
			border: 4px solid #fff; object-fit: cover; cursor: pointer;
			box-shadow: 0 4px 10px rgba(0,0,0,0.1);
		}
		.user-role {
			margin-top: 10px; font-weight: bold; color: #303133; font-size: 18px;
		}
		.user-desc { color: #909399; font-size: 13px; margin-top: 5px; }
		.form-card {
			flex: 1;
			background: #fff;
			border-radius: 8px;
			box-shadow: 0 2px 12px rgba(0,0,0,0.04);
			padding: 30px;
		}
		.form-title {
			font-size: 16px; font-weight: bold; border-left: 4px solid #409eff;
			padding-left: 10px; margin-bottom: 30px; color: #333;
		}
		.unit .left { width: 100px !important; text-align: right; padding-right: 15px; }
		.unit .right { flex: 1; }
		.text {
			border: 1px solid #dcdfe6; border-radius: 4px; height: 36px;
			width: 100%; max-width: 300px; padding-left: 10px;
		}
		.readonly { background: #f5f7fa; cursor: not-allowed; }
		.btn-save {
			background: #409eff; color: #fff; border: none; padding: 10px 30px;
			border-radius: 4px; cursor: pointer;
		}
	</style>
</head>

<body>
<div class="layout-container">

	<div class="profile-card">
		<div class="card-header-bg"></div>
		<div class="avatar-wrapper">
			<img id="view-avatar" src="/javaex/pc/images/upAvatar.jpg"
				 class="avatar-img"
				 title="点击更换头像"
				 onclick="$('#file').click()" />
		</div>
		<div class="user-role" id="display-name">Loading...</div>
		<div class="user-desc" id="display-role"></div>

		<input type="file" id="file" style="display:none" accept="image/*" onchange="uploadAvatar()" />
		<input type="hidden" id="avatar" />
		<input type="hidden" id="userId" />
	</div>

	<div class="form-card">
		<div class="form-title">基本资料编辑</div>

		<div class="unit">
			<div class="left">用户名</div>
			<div class="right">
				<input type="text" class="text readonly" id="username" readonly />
			</div>
		</div>

		<div class="unit">
			<div class="left">身份类型</div>
			<div class="right">
				<input type="text" class="text readonly" id="ident" readonly />
			</div>
		</div>

		<div class="unit">
			<div class="left"><span style="color:red">*</span> 昵称</div>
			<div class="right">
				<input type="text" class="text" id="nickname" placeholder="请输入您的昵称" />
			</div>
		</div>

		<div style="border-top: 1px dashed #eee; margin: 30px 0;"></div>
		<div class="form-title">安全设置</div>

		<div class="unit">
			<div class="left">旧密码</div>
			<div class="right">
				<input type="password" class="text" id="oldPwd" placeholder="修改密码时必填" />
			</div>
		</div>

		<div class="unit">
			<div class="left">新密码</div>
			<div class="right">
				<input type="password" class="text" id="newPwd" placeholder="不修改请留空" />
			</div>
		</div>

		<div class="unit" style="margin-top: 40px; margin-left: 115px;">
			<input type="button" id="save" class="btn-save" value="保存修改" />
		</div>
	</div>
</div>

<script>
	// 初始化当前用户
	$(function () {
		$.get("/user/currUser", function (res) {
			if (res.code === 200) {
				var u = res.data;
				// ✅ 2. 初始化时保存 ID
				$("#userId").val(u.id);

				$("#username").val(u.username);
				$("#nickname").val(u.nickname);
				$("#ident").val(u.ident);
				$("#display-name").text(u.nickname || u.username);
				$("#display-role").text(u.ident);
				if (u.avatar) {
					$("#view-avatar").attr("src", u.avatar);
					$("#avatar").val(u.avatar);
				}
			}
		});
	});

	// 上传头像
	function uploadAvatar() {
		var file = $("#file")[0].files[0];
		if (!file) return;

		var formData = new FormData();
		formData.append("file", file);

		javaex.optTip({content: "正在上传...", type: "submit"});

		$.ajax({
			url: "/user/uploadAvatar",
			type: "POST",
			data: formData,
			processData: false,
			contentType: false,
			success: function (res) {
				if (res.code === 200) {
					$("#view-avatar").attr("src", res.data);
					$("#avatar").val(res.data);
					javaex.optTip({content: "头像上传成功", type: "success"});
				} else {
					javaex.optTip({content: res.msg, type: "error"});
				}
			}
		});
	}

	// 保存基本信息
	$("#save").click(function () {
		var nickname = $("#nickname").val().trim();
		if (nickname === "") {
			javaex.optTip({content: "昵称不能为空", type: "error"});
			return;
		}

		$.ajax({
			url: "/user/update",
			type: "POST",
			contentType: "application/json;charset=utf-8",
			data: JSON.stringify({
				// ✅ 3. 提交时带上 ID
				id: $("#userId").val(),
				nickname: nickname,
				avatar: $("#avatar").val()
			}),
			success: function (res) {
				if (res.code === 200) {
					var oldPwd = $("#oldPwd").val();
					var newPwd = $("#newPwd").val();
					if (oldPwd && newPwd) {
						updatePassword(oldPwd, newPwd);
					} else {
						javaex.optTip({content: "保存成功", type: "success"});
						setTimeout(function(){ location.reload(); }, 800);
					}
				} else {
					javaex.optTip({content: res.msg, type: "error"});
				}
			}
		});
	});

	function updatePassword(oldPwd, newPwd) {
		$.ajax({
			url: "/user/updatePwd",
			type: "POST",
			contentType: "application/json;charset=utf-8",
			// 这里的 updatePwd 逻辑，如果后台也需要 ID，建议也加上 id: $("#userId").val()
			// 不过通常修改密码是单独处理的，可能只需要用户名或从 session 取，暂且保持原样
			data: JSON.stringify({oldPwd: oldPwd, newPwd: newPwd}),
			success: function (res) {
				if (res.code === 200) {
					javaex.optTip({content: "密码已修改，请重新登录", type: "success"});
					setTimeout(function(){ location.href = "/logout"; }, 1500);
				} else {
					javaex.optTip({content: res.msg, type: "error"});
				}
			}
		});
	}
</script>
</body>
</html>
