<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link href="../javaex/pc/css/common.css" rel="stylesheet" />
    <link href="../javaex/pc/css/skin/tina.css" rel="stylesheet" />
    <link href="../javaex/pc/css/module-theme.css" rel="stylesheet" />
    <script src="../javaex/pc/lib/jquery-1.7.2.min.js"></script>
    <script src="../javaex/pc/js/javaex.min.js"></script>
    <title>我的行为记录</title>
    <style>
        body{background:#f5f7fa;padding:12px;}
        .card{background:#fff;border-radius:8px;padding:16px;}
        .type{font-size:12px;color:#888;}
    </style>
</head>
<body class="module-theme">
<div class="card">
    <h2>我的行为记录</h2>
    <table class="table color2">
        <thead>
        <tr align="center">
            <th style="width:160px;">时间</th>
            <th style="width:120px;">类型</th>
            <th style="width:120px;">bookId</th>
            <th style="width:100px;">score</th>
        </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>
</div>
<script>
    $(function(){
        $.get('/actions/my/list?limit=100', function(res){
            if(res.code!==200){ javaex.message({content:res.msg||'加载失败', type:'error'}); return; }
            var list = res.data || [];
            var html='';
            $.each(list, function(_, a){
                html += "<tr align='center'>";
                html += "<td>"+(a.createdAt||'')+"</td>";
                html += "<td>"+(a.actionType||'')+"</td>";
                html += "<td>"+(a.bookId==null?'-':a.bookId)+"</td>";
                html += "<td>"+(a.score==null?0:a.score)+"</td>";
                html += "</tr>";
            });
            $('#tbody').html(html);
        });
    });
</script>
</body>
</html>
