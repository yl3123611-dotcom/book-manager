<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>
<head>
	<meta charset="utf-8">
	<!--字体图标-->
	<link href="../../javaex/pc/css/icomoon.css" rel="stylesheet" />
	<!--动画-->
	<link href="../../javaex/pc/css/animate.css" rel="stylesheet" />
	<!--骨架样式-->
	<link href="../../javaex/pc/css/common.css" rel="stylesheet" />
	<!--皮肤（缇娜）-->
	<link href="../../javaex/pc/css/skin/tina.css" rel="stylesheet" />
	<!--jquery，不可修改版本-->
	<script src="../../javaex/pc/lib/jquery-1.7.2.min.js"></script>
	<!--全局动态修改-->
	<script src="../../javaex/pc/js/common.js"></script>
	<!--核心组件-->
	<script src="../../javaex/pc/js/javaex.min.js"></script>
	<!--表单验证-->
	<script src="../../javaex/pc/js/javaex-formVerify.js"></script>
	<title>后台管理</title>
</head>
<style>
	.file-btn{
		position: relative;
		display: inline-block;
		padding: 6px 12px;
		border: 1px solid #dcdfe6;
		border-radius: 4px;
		background: #fff;
		color: #606266;
		cursor: pointer;
	}
	.file-btn input[type="file"]{
		position: absolute;
		left: 0;
		top: 0;
		width: 100%;
		height: 100%;
		opacity: 0;
		cursor: pointer;
	}
</style>

<body>
<!--全部主体内容-->
<div class="list-content">
	<!--块元素-->
	<div class="block">
		<!--修饰块元素名称-->
		<div class="banner">
			<p class="tab fixed">编辑图书</p>
		</div>

		<!--正文内容-->
		<div class="main">
			<form>
				<!--文本框-->
				<div class="unit clear">
					<div class="left"><span class="required">*</span><p class="subtitle">书名</p></div>
					<div class="right">
						<input type="text" id="bookName" class="text" placeholder="请输入图书名称" />
					</div>
				</div>

				<div class="unit clear">
					<div class="left"><span class="required">*</span><p class="subtitle">ISBN编号</p></div>
					<div class="right">
						<input type="text" id="isbn" class="text" placeholder="ISBN编号" />
					</div>
				</div>

				<div class="unit clear">
					<div class="left"><span class="required">*</span><p class="subtitle">作者</p></div>
					<div class="right">
						<input type="text" id="author" class="text" placeholder="作者" />
					</div>
				</div>

				<!-- ✅ 新增：封面上传 -->
				<div class="unit clear">
					<div class="left"><p class="subtitle">图书封面</p></div>
					<div class="right">
						<a href="javascript:;" class="file-btn">选择图片
							<input type="file" accept="image/*" onchange="uploadImage(this)">
						</a>

						<!-- 关键：存封面路径（提交时用） -->
						<input type="hidden" id="cover" />

						<div id="coverPreview" style="margin-top:10px;">
							<img src="/javaex/img/1.jpg"
								 width="100" height="140"
								 style="object-fit:cover;border:1px solid #eee;"
								 onerror="this.src='/javaex/img/1.jpg'">
						</div>
					</div>
				</div>

				<!--下拉选择框-->
				<div class="unit clear">
					<div class="left"><p class="subtitle">图书分类</p></div>
					<div class="right">
						<span id="type" style="color: #2db7f5"></span>
						<select id="select">
							<option value="" id="opt">请选择</option>
						</select>
						<input type="text" id="customType" class="text" style="margin-top:8px;" placeholder="可自定义分类（选填，优先使用）" />
					</div>
				</div>

				<div class="unit clear">
					<div class="left"><span class="required"></span><p class="subtitle">页数</p></div>
					<div class="right">
						<input type="text" id="pages" class="text" placeholder="图书页数" />
					</div>
				</div>

				<div class="unit clear">
					<div class="left"><span class="required"></span><p class="subtitle">定价</p></div>
					<div class="right">
						<input type="text" id="price" class="text" placeholder="定价" />
					</div>
				</div>

				<div class="unit clear">
					<div class="left"><p class="subtitle">出版时间</p></div>
					<div class="right">
						<input type="text" id="publishTime" class="ex-date" style="width: 180px;" value="" readonly/>
					</div>
				</div>

				<div class="unit clear">
					<div class="left"><span class="required"></span><p class="subtitle">出版社</p></div>
					<div class="right">
						<input type="text" id="publish" class="text" placeholder="出版社" />
					</div>
				</div>

				<div class="unit clear">
					<div class="left"><span class="required"></span><p class="subtitle">库存数量</p></div>
					<div class="right">
						<input type="text" id="size" class="text" placeholder="库存数量" />
					</div>
				</div>

				<div class="unit clear">
					<div class="left"><span class="required"></span><p class="subtitle">翻译</p></div>
					<div class="right">
						<input type="text" id="translate" class="text" placeholder="翻译" />
					</div>
				</div>


				<div class="unit clear">
					<div class="left"><p class="subtitle">书籍位置</p></div>
					<div class="right">
						<input type="text" id="locationText" class="text" placeholder="例如：二楼A区-3号书架-第2层" />
					</div>
				</div>

				<!--提交按钮-->
				<div class="unit clear" style="width: 800px;">
					<div style="text-align: center;">
						<input type="button" id="return" class="button no" value="返回" />
						<input type="button" id="save" class="button yes" value="保存" />
					</div>
				</div>
			</form>

		</div>
	</div>
</div>

<script type="text/javascript">

	// ✅ 上传封面
	function uploadImage(obj) {
		var file = obj.files[0];
		if (!file) return;

		var formData = new FormData();
		formData.append("file", file);

		$.ajax({
			url: "/book/upload",
			type: "POST",
			data: formData,
			processData: false,
			contentType: false,
			success: function(res) {
				if (res.code == 200) {
					// res.data = /upload/xxx.png
					$("#cover").val(res.data);
					$("#coverPreview img").attr("src", res.data);
					javaex.optTip({ content: "封面上传成功!", type: "success" });
				} else {
					javaex.optTip({ content: res.msg || "上传失败!", type: "error" });
				}
			},
			error: function(e) {
				console.log(e.status);
				console.log(e.responseText);
				javaex.optTip({ content: "上传失败!", type: "error" });
			}
		});
	}

	// 页面一加载赋值表单
	$(document).ready(function(){
		var id = getQueryVariable("id");

		loadCategories();

		$.get("/book/detail", {"id": id}, function(res){
			var data = res.data;
			console.log(data);

			$("#bookName").val(data.name);
			$("#isbn").val(data.isbn);
			$("#author").val(data.author);
			$("#pages").val(data.pages);
			$("#price").val(data.price);
			$("#publishTime").val(data.publishTime);
			$("#publish").val(data.publish);
			$("#size").val(data.size);
			$("#translate").val(data.translate);
			$("#type").text(data.type);

			// 回显封面（关键）
			if (data.cover) {
				$("#cover").val(data.cover);
				$("#coverPreview img").attr("src", data.cover);
			}

			$('#locationText').val(data.locationText || '');
		});
	});

	javaex.select({
		id : "select",
		isSearch : true,
		maxNum: 5,
		callback: function (rtn) {
			$("#type").text("");
		}
	});

	javaex.date({
		id : "publishTime",
		isTime : true,
		date : "2018-04-15 01:01:01",
		callback : function(rtn) {}
	});

	// 获取地址栏参数
	function getQueryVariable(variable){
		var query = window.location.search.substring(1);
		var vars = query.split("&");
		for (var i=0;i<vars.length;i++) {
			var pair = vars[i].split("=");
			if(pair[0] == variable){return pair[1];}
		}
		return false;
	}

	// 监听点击保存按钮事件
	$("#save").click(function() {
		var bookName = $("#bookName").val();
		var isbn = $("#isbn").val();
		var author = $("#author").val();
		var select = ($('#select').val() || '').trim();
		if (!select) {
			select = ($('#type').text() || '').trim();
		}
		var customType = ($('#customType').val() || '').trim();
		var finalType = customType || select;
		var locationText = ($('#locationText').val() || '').trim();
		var pages = $("#pages").val();
		var price = $("#price").val();
		var publishTime = $("#publishTime").val();
		var publish = $("#publish").val();
		var size = $("#size").val();
		var translate = $("#translate").val();

		// ✅ 关键：封面
		var cover = $("#cover").val();

		// 校验文本
		if (bookName == "") {
			javaex.optTip({ content : "图书名称不能为空!", type : "error" });
			return false;
		}
		if (isbn == "") {
			javaex.optTip({ content : "ISBN图书编码不能为空!", type : "error" });
			return false;
		}
		if (author == "") {
			javaex.optTip({ content : "图书作者不能为空!", type : "error" });
			return false;
		}
		if (finalType == "") {
			javaex.optTip({ content : "图书分类不能为空!", type : "error" });
			return false;
		}

		var id = getQueryVariable("id");

		// ✅ 表单数据：必须带 cover，否则会把封面清空
		var json = {
			"id": id,
			"isbn": isbn,
			"name": bookName,
			"author": author,
			"pages": pages,
			"translate": translate,
			"publish": publish,
			"price": price,
			"size": size,
			"type": finalType,
			"publishTime": publishTime,
			"cover": cover,
			"locationText": locationText
		};

		$.ajax({
			type : "POST",
			contentType: "application/json;charset=UTF-8",
			url : "/book/update",
			data : JSON.stringify(json),
			success : function(result) {
				console.log(result);
				var data = result.data;
				var code = result.code;

				if (code == 200) {
					if (data == false){
						javaex.message({ content : "修改失败", type : "error" });
					} else {
						javaex.message({ content : "修改成功", type : "success" });
						setTimeout(function(){window.location.href="/book/book-list";},1500)
					}
				}
			},
			error : function(e){
				console.log(e.status);
				console.log(e.responseText);
			}
		});
	});

	$("#return").click(function() {
		window.location.href = "/book/book-list";
	});

	// load categories into select
	function loadCategories(){
		$.get('/category/list/options', function(res){
			if(res && res.code==200 && res.data){
				var defaults = res.data.defaultList || [];
				var customs = res.data.customList || [];
				var seen = {};
				var $sel = $('#select');
				$sel.empty();
				$sel.append('<option value="">请选择</option>');
				for(var i=0;i<defaults.length;i++){
					var n = String(defaults[i] || '').trim();
					if(!n || seen[n]) continue;
					seen[n] = true;
					$sel.append('<option value="'+ n +'">'+ n +'</option>');
				}
				for(var j=0;j<customs.length;j++){
					var it = customs[j] || {};
					var cn = String(it.name || '').trim();
					if(!cn || seen[cn]) continue;
					seen[cn] = true;
					$sel.append('<option value="'+ cn +'">'+ cn +'</option>');
				}
			}
		});
	}


</script>
</body>
</html>
