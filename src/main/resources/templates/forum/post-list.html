<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>论坛 - 帖子列表</title>
    <link href="../../javaex/pc/css/common.css" rel="stylesheet" />
    <link href="../../javaex/pc/css/skin/tina.css" rel="stylesheet" />
    <link href="../../javaex/pc/css/module-theme.css" rel="stylesheet" />
    <script src="../../javaex/pc/lib/jquery-1.7.2.min.js"></script>
    <script src="../../javaex/pc/js/javaex.min.js"></script>
    <style>
        body { background-color: #f0f2f5; padding: 20px; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }

        .breadcrumb { margin-bottom: 16px; color: #595959; }
        .breadcrumb span { margin: 0 4px; }
        .breadcrumb .active { color: #1890ff; font-weight: 500; }

        .block { background: #fff; padding: 24px; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.06); min-height: 600px; }
        .block-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #e8e8e8; }
        .block-title { font-size: 18px; font-weight: 600; color: #333; display: flex; align-items: center; }
        .block-title::before { content: ''; display: inline-block; width: 4px; height: 18px; background: #1890ff; margin-right: 8px; border-radius: 2px; }

        .post-item { padding: 20px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: all 0.3s; border-radius: 4px; }
        .post-item:hover { background: #fafafa; transform: translateX(4px); }
        .post-item:last-child { border-bottom: none; }
        .post-title { font-weight: 600; font-size: 16px; color: #262626; margin-bottom: 8px; }
        .post-summary { color: #8c8c8c; font-size: 13px; margin-bottom: 8px; line-height: 1.5; }
        .post-meta { color: #bfbfbf; font-size: 12px; }

        .search-box { display: flex; gap: 10px; }
        .search-box input { height: 32px; padding: 0 10px; border: 1px solid #d9d9d9; border-radius: 4px; width: 300px; }
        .search-box .button { height: 32px; line-height: 30px; }
        .page { margin-top: 20px; text-align: right; }
    </style>
</head>
<body class="module-theme">
<div class="breadcrumb">
    <span>论坛交流</span>
    <span>/</span>
    <span class="active">帖子列表</span>
</div>

<div class="block">
    <div class="block-header">
        <div class="block-title">最新讨论</div>
        <div class="search-box">
            <input id="keyword" type="text" placeholder="搜索帖子标题或内容" />
            <button class="button blue" onclick="search()"><span class="icon-search"></span> 搜索</button>
            <button class="button green" onclick="toAdd()"><span class="icon-plus"></span> 发帖</button>
        </div>
    </div>

    <div id="list"></div>
    <div class="page"><ul id="page" class="pagination"></ul></div>
</div>

<script>
    function toAdd(){ window.location.href = '/forum/post-add'; }
    function openDetail(id){ window.location.href = '/forum/post-detail?id=' + id; }

    function render(list){
        var html = '';
        for(var i=0;i<list.length;i++){
            var it = list[i];
            html += '<div class="post-item" onclick="openDetail('+it.id+')">'
                + '<div class="post-title">'+(it.title||'')+'</div>'
                + '<div class="post-summary">'+(it.summary||'')+'</div>'
                + '<div class="post-meta">阅读 '+(it.viewCount||0)+' • 回复 '+(it.replyCount||0)+' • '+(it.createdAt||'')+'</div>'
                + '</div>';
        }
        $('#list').html(html);
    }

    function loadPage(currPage, perPage){
        var keyword = $('#keyword').val();
        $.ajax({
            url: '/forum/api/posts/page',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({currPage: currPage, pageSize: perPage, keyword: keyword}),
            success: function(res){
                if(res && res.code == 200){
                    var p = res.data;
                    render(p.list || []);
                    var total = p.total || 0;
                    var pageSize = p.pageSize || 10;
                    var pageCount = Math.ceil(total / pageSize);
                    javaex.page({
                        id: 'page',
                        pageCount: pageCount,
                        currentPage: p.currPage,
                        perPageCount: pageSize,
                        totalNum: total,
                        position: 'center',
                        callback: function(r){ loadPage(r.pageNum, r.perPageCount); }
                    });
                }
            }
        });
    }

    function search(){ loadPage(1,10); }
    $(document).ready(function(){ loadPage(1,10); });
</script>
</body>
</html>
