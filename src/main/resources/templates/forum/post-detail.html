<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>帖子详情</title>
    <link href="../../javaex/pc/css/common.css" rel="stylesheet" />
    <link href="../../javaex/pc/css/skin/tina.css" rel="stylesheet" />
    <link href="../../javaex/pc/css/module-theme.css" rel="stylesheet" />
    <script src="../../javaex/pc/lib/jquery-1.7.2.min.js"></script>
</head>
<body class="module-theme">
<div class="block">
    <h2 id="title">帖子详情</h2>
    <div class="main">
        <div id="content" style="padding:12px;border:1px solid #eee;background:#fff;margin-bottom:12px;"></div>
        <div id="meta" style="color:#999;font-size:12px;margin-bottom:12px"></div>

        <!-- 回复区 -->
        <div style="margin-top:20px; background:#fff; padding:12px; border-radius:6px;">
            <h3>回复</h3>
            <div id="replyList"></div>
            <div style="margin-top:8px;">
                <textarea id="replyContent" style="width:100%;height:80px;"></textarea>
                <div style="margin-top:8px; text-align:right;">
                    <button class="button green" id="btnReply" onclick="submitReply()">回复</button>
                </div>
            </div>
        </div>

        <div style="margin-top:12px;">
            <button class="button empty" onclick="history.back()">返回</button>
        </div>
    </div>
</div>

<script>
    function getUrlParam(name){
        var s = window.location.search.substring(1); var parts=s.split('&'); for(var i=0;i<parts.length;i++){var kv=parts[i].split('='); if(kv[0]==name) return decodeURIComponent(kv[1]||'');} return null;
    }

    var currentUser = null;
    $(document).ready(function(){
        $.get('/user/currUser', function(res){ if(res && res.code==200 && res.data) currentUser = res.data; });

        var id = getUrlParam('id'); if(!id){ alert('缺少id'); return; }
        $.get('/forum/api/post', {id: id}, function(res){
            if(res && res.code==200){
                var d = res.data;
                $('#title').text(d.title || '');
                $('#content').html(d.content || '');
                $('#meta').text('阅读 ' + (d.viewCount||0) + ' • 回复 ' + (d.replyCount||0) + ' • ' + (d.createdAt||''));
                loadReplies(id);
            }else alert('帖子不存在');
        });
    });

    function loadReplies(postId){
        $.get('/forum/api/replies', {postId: postId}, function(res){
            if(res && res.code==200){
                var list = res.data || [];
                var html = '';
                for(var i=0;i<list.length;i++){
                    var r = list[i];
                    var name = r.nickname || r.username || ('用户'+(r.userId||''));
                    html += '<div style="padding:8px;border-top:1px dashed #eee;">'
                        + '<div style="font-weight:bold">'+name+' <span style="color:#999;font-size:12px;margin-left:8px;">'+(r.createdAt||'')+'</span></div>'
                        + '<div style="margin-top:6px;">'+(r.content||'')+'</div>'
                        + '</div>';
                }
                $('#replyList').html(html);
            }
        });
    }

    function submitReply(){
        if(!currentUser){ alert('请先登录后再回复'); window.location.href='/login'; return; }
        var postId = getUrlParam('id');
        var content = $('#replyContent').val();
        if(!content || !content.trim()){ alert('请输入回复内容'); return; }
        $.post('/forum/api/reply/add', {postId: postId, content: content}, function(res){
            if(res && res.code==200){ $('#replyContent').val(''); loadReplies(postId); }
            else alert(res.msg || '回复失败');
        });
    }
</script>
</body>
</html>
