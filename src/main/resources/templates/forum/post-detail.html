<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>帖子详情</title>
    <link href="../../javaex/pc/css/common.css" rel="stylesheet" />
    <link href="../../javaex/pc/css/skin/tina.css" rel="stylesheet" />
    <link href="../../javaex/pc/css/module-theme.css" rel="stylesheet" />
    <script src="../../javaex/pc/lib/jquery-1.7.2.min.js"></script>
    <script src="../../javaex/pc/js/javaex.min.js"></script>
</head>
<body class="module-theme">
<div class="block">
    <h2 id="title">帖子详情</h2>
    <div class="main">
        <!-- ...existing post area... -->
        <div style="margin-bottom:10px;">
            <button class="button" onclick="toggleFav(true)">收藏帖子</button>
            <button class="button" onclick="toggleFav(false)">取消收藏</button>
            <button id="btnEditPost" class="button blue" style="display:none;" onclick="showEditPost()">编辑帖子</button>
            <button id="btnDeletePost" class="button red" style="display:none;" onclick="deletePost()">删除帖子</button>
            <button id="btnReportPost" class="button" style="display:none;" onclick="toggleReportBox()">举报帖子</button>
        </div>
        <div id="editPostBox" style="display:none;padding:10px;border:1px solid #e8eefb;background:#f7faff;margin-bottom:10px;border-radius:6px;">
            <div style="margin-bottom:8px;"><input id="editTitle" class="text" style="width:100%;" placeholder="帖子标题" /></div>
            <div style="margin-bottom:8px;">
                <select id="editCategory" class="select" style="width:180px;height:34px;">
                    <option value="问答">问答</option>
                    <option value="闲聊">闲聊</option>
                    <option value="资源">资源</option>
                    <option value="求助">求助</option>
                    <option value="综合">综合</option>
                </select>
            </div>
            <div><textarea id="editContent" style="width:100%;height:140px;"></textarea></div>
            <div style="margin-top:8px;text-align:right;">
                <button class="button" onclick="hideEditPost()">取消</button>
                <button class="button green" onclick="submitEditPost()">保存修改</button>
            </div>
        </div>
        <div id="reportBox" style="display:none;padding:10px;border:1px solid #f7d7d7;background:#fff8f8;margin-bottom:10px;border-radius:6px;">
            <div style="font-size:13px;color:#666;margin-bottom:6px;">举报原因（将提交给管理员处理）：</div>
            <textarea id="reportReason" style="width:100%;height:80px;" placeholder="例如：广告引流、辱骂、违法内容"></textarea>
            <div style="margin-top:8px;text-align:right;">
                <button class="button" onclick="toggleReportBox(false)">取消</button>
                <button class="button red" onclick="submitReport()">提交举报</button>
            </div>
        </div>
        <div id="content" style="padding:12px;border:1px solid #eee;background:#fff;margin-bottom:12px;"></div>
        <div id="meta" style="color:#999;font-size:12px;margin-bottom:12px"></div>

        <div style="margin-top:20px; background:#fff; padding:12px; border-radius:6px;">
            <h3>回复（支持楼中楼）</h3>
            <div id="replyList"></div>
            <div style="margin-top:8px; color:#999;" id="replyToText"></div>
            <div style="margin-top:8px;">
                <textarea id="replyContent" style="width:100%;height:80px;"></textarea>
                <div style="margin-top:8px; text-align:right;">
                    <button class="button empty" onclick="clearReplyTo()">取消回复对象</button>
                    <button class="button green" id="btnReply" onclick="submitReply()">回复</button>
                </div>
            </div>
        </div>

        <div style="margin-top:12px;">
            <button class="button empty" onclick="history.back()">返回</button>
        </div>
    </div>
</div>

<script>
    function getUrlParam(name){
        var s = window.location.search.substring(1); var parts=s.split('&'); for(var i=0;i<parts.length;i++){var kv=parts[i].split('='); if(kv[0]==name) return decodeURIComponent(kv[1]||'');} return null;
    }

    function escHtml(s){
        if(s == null) return '';
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    function textToHtml(s){
        return escHtml(s).replace(/\r\n|\n|\r/g, '<br/>');
    }

    var currentUser = null;
    var postData = null;
    var replyTo = null;

    function toast(content, type){
        javaex.message({content: content, type: type || 'error'});
    }

    $(document).ready(function(){
        $.get('/user/currUser', function(res){
            if(res && res.code==200 && res.data) currentUser = res.data;
            if(postData){ syncOwnerButtons(); }
        });

        var id = getUrlParam('id'); if(!id){ toast('缺少id'); return; }
        $.get('/forum/api/post', {id: id}, function(res){
            if(res && res.code==200){
                var d = res.data;
                postData = d;
                $('#title').text(d.title || '');
                $('#content').html(textToHtml(d.content || ''));
                $('#meta').html('分类 ' + (d.category || '综合') + ' • 阅读 ' + (d.viewCount||0) + ' • 回复 ' + (d.replyCount||0) + ' • ' + (d.createdAt||'')
                    + (d.acceptedReplyId ? (' • 已采纳回复ID: '+d.acceptedReplyId) : ''));
                $('#editTitle').val(d.title || '');
                $('#editCategory').val(d.category || '综合');
                $('#editContent').val(d.content || '');
                syncOwnerButtons();
                loadReplies(id);
            }else toast('帖子不存在');
        });
    });

    function canAccept(){
        if(!currentUser || !postData) return false;
        return String(currentUser.id) === String(postData.userId);
    }

    function canEditPost(){
        return canAccept();
    }

    function syncOwnerButtons(){
        if(canEditPost()){
            $('#btnEditPost').show();
            $('#btnDeletePost').show();
            $('#btnReportPost').hide();
        }else if(currentUser){
            $('#btnReportPost').show();
        }
    }

    function clearReplyTo(){
        replyTo = null;
        $('#replyToText').text('');
    }

    function setReplyTo(id, name){
        replyTo = id;
        $('#replyToText').text('正在回复：' + (name || ('#'+id)));
        $('#replyContent').focus();
    }

    function loadReplies(postId){
        $.get('/forum/api/replies', {postId: postId}, function(res){
            if(!(res && res.code==200)){ return; }
            var list = res.data || [];
            var map = {};
            var roots = [];
            for(var i=0;i<list.length;i++){
                var r = list[i] || {};
                r.children = [];
                map[r.id] = r;
            }
            for(var j=0;j<list.length;j++){
                var x = list[j] || {};
                if(x.parentId && map[x.parentId]) map[x.parentId].children.push(x);
                else roots.push(x);
            }

            function renderNode(r, depth){
                var name = r.nickname || r.username || ('用户'+(r.userId||''));
                var pad = depth > 0 ? ('margin-left:' + (depth*24) + 'px;') : '';
                var html = '<div style="padding:8px;border-top:1px dashed #eee;'+pad+'">'
                    + '<div style="font-weight:bold">'+escHtml(name)+' <span style="color:#999;font-size:12px;margin-left:8px;">'+escHtml(r.createdAt||'')+'</span>'
                    + '<a href="javascript:;" style="margin-left:10px;font-size:12px;" onclick="setReplyTo('+r.id+',\''+escHtml(name)+'\')">回复TA</a>';
                if(canAccept()){
                    html += '<a href="javascript:;" style="margin-left:10px;font-size:12px;color:#389e0d;" onclick="acceptReply('+r.id+')">采纳</a>';
                }
                if(postData && String(postData.acceptedReplyId||'')===String(r.id)){
                    html += '<span style="margin-left:10px;color:#389e0d;font-size:12px;">[已采纳]</span>';
                }
                html += '</div>'
                    + '<div style="margin-top:6px;">'+textToHtml(r.content||'')+'</div>'
                    + '</div>';
                for(var k=0;k<r.children.length;k++) html += renderNode(r.children[k], depth+1);
                return html;
            }

            var html = '';
            for(var z=0;z<roots.length;z++) html += renderNode(roots[z], 0);
            $('#replyList').html(html || '<div style="color:#999;">暂无回复</div>');
        });
    }

    function submitReply(){
        if(!currentUser){ toast('请先登录后再回复'); window.location.href='/login'; return; }
        var postId = getUrlParam('id');
        var content = $('#replyContent').val();
        if(!content || !content.trim()){ toast('请输入回复内容'); return; }
        var data = {postId: postId, content: content};
        if(replyTo) data.parentId = replyTo;
        $.post('/forum/api/reply/add', data, function(res){
            if(res && res.code==200){
                $('#replyContent').val('');
                clearReplyTo();
                loadReplies(postId);
            } else toast(res.msg || '回复失败');
        });
    }

    function acceptReply(replyId){
        var postId = getUrlParam('id');
        $.post('/forum/api/post/accept', {postId:postId, replyId:replyId}, function(res){
            if(res && res.code===200){
                toast('已采纳该回复', 'success');
                $.get('/forum/api/post', {id: postId}, function(r){
                    if(r && r.code===200){ postData = r.data || postData; }
                    loadReplies(postId);
                });
            }else{
                toast((res && res.msg) || '采纳失败');
            }
        });
    }

    function toggleFav(on){
        var postId = getUrlParam('id');
        $.post('/forum/api/post/favorite', {postId:postId, on:on}, function(res){
            if(res && res.code===200) toast(on ? '已收藏' : '已取消收藏', 'success');
            else toast((res && res.msg) || '操作失败');
        });
    }

    function showEditPost(){
        if(!canEditPost()){ toast('仅作者可编辑'); return; }
        $('#editPostBox').show();
    }

    function hideEditPost(){
        $('#editPostBox').hide();
    }

    function submitEditPost(){
        if(!postData){ return; }
        var title = $.trim($('#editTitle').val());
        var content = $.trim($('#editContent').val());
        var category = $('#editCategory').val();
        if(!title || !content){ toast('标题和内容不能为空'); return; }
        $.post('/forum/api/post/update', {id:postData.id, title:title, content:content, category:category}, function(res){
            if(res && res.code===200){
                toast('修改成功', 'success');
                hideEditPost();
                $('#title').text(title);
                $('#content').html(textToHtml(content));
                postData.title = title;
                postData.content = content;
                postData.category = category;
                $('#meta').html('分类 ' + (postData.category || '综合') + ' • 阅读 ' + (postData.viewCount||0) + ' • 回复 ' + (postData.replyCount||0) + ' • ' + (postData.createdAt||''));
            }else{
                toast((res && res.msg) || '修改失败');
            }
        });
    }

    function doDeletePost(){
        $.post('/forum/api/post/delete', {id:postData.id}, function(res){
            if(res && res.code===200){
                toast('删除成功', 'success');
                window.location.href = '/forum/post-list';
            }else{
                toast((res && res.msg) || '删除失败');
            }
        });
    }

    function deletePost(){
        if(!postData){ return; }
        javaex.confirm({
            title: '删除确认',
            content: '确认删除该帖子吗？删除后不可恢复。',
            callback: 'doDeletePost()'
        });
    }

    function toggleReportBox(forceOn){
        if(!currentUser){ toast('请先登录后再举报'); window.location.href='/login'; return; }
        if(canEditPost()){ return; }
        if(forceOn === false){ $('#reportBox').hide(); return; }
        $('#reportBox').toggle();
    }

    function submitReport(){
        if(!postData){ return; }
        var reason = $.trim($('#reportReason').val());
        $.post('/forum/api/post/report', {postId:postData.id, reason:reason}, function(res){
            if(res && res.code===200){
                toast('举报已提交，管理员会尽快处理', 'success');
                $('#reportReason').val('');
                $('#reportBox').hide();
            }else{
                toast((res && res.msg) || '举报失败');
            }
        });
    }
</script>
</body>
</html>
