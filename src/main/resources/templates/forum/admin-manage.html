<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>论坛管理</title>
    <link href="../../javaex/pc/css/common.css" rel="stylesheet" />
    <link href="../../javaex/pc/css/skin/tina.css" rel="stylesheet" />
    <link href="../../javaex/pc/css/module-theme.css" rel="stylesheet" />
    <script src="../../javaex/pc/lib/jquery-1.7.2.min.js"></script>
    <script src="../../javaex/pc/js/javaex.min.js"></script>
</head>
<body class="module-theme">
<div class="block">
    <h2>论坛管理</h2>
    <div class="main">
        <div style="margin-bottom:12px;">
            <input id="keyword" class="text" style="width:420px" placeholder="搜索" />
            <button class="button blue" onclick="search()">搜索</button>
        </div>
        <div id="list"></div>
        <div class="page"><ul id="page" class="pagination"></ul></div>

        <div id="replies" style="margin-top:20px;background:#fff;padding:12px;display:none;">
            <h3>回复列表</h3>
            <div id="replyList"></div>
        </div>

        <div id="reports" style="margin-top:20px;background:#fff;padding:12px;">
            <h3>举报处理</h3>
            <div style="margin-bottom:8px;">
                <select id="reportStatus" class="select" style="width:140px;height:32px;">
                    <option value="">全部状态</option>
                    <option value="0">待处理</option>
                    <option value="1">已通过</option>
                    <option value="2">已驳回</option>
                </select>
                <button class="button small" onclick="loadReports()">刷新举报</button>
            </div>
            <div id="reportList"></div>
        </div>
    </div>
</div>

<script>
    var currentPostId = null;
    var pendingReportId = null;
    var pendingReportStatus = null;

    function toast(content, type){
        javaex.message({content: content, type: type || 'error'});
    }

    function render(list){
        var html='';
        for(var i=0;i<list.length;i++){
            var it=list[i];
            html += '<div style="padding:12px;border-bottom:1px solid #eee;">'
                + '<div style="font-weight:bold">'+(it.title||'')+'</div>'
                + '<div style="color:#999;font-size:12px;margin-top:6px">用户:'+ (it.userId||'') +' 状态:'+(it.status||0)+' 置顶:'+(it.isPinned||0)+' 加精:'+(it.isFeatured||0)+' 回复数:'+(it.replyCount||0)+'</div>'
                + '<div style="margin-top:6px">'
                + '<button class="button small" onclick="doStatus('+it.id+',1)">隐藏</button> '
                + '<button class="button small" onclick="doStatus('+it.id+',0)">恢复</button> '
                + '<button class="button small" onclick="doPin('+it.id+','+(it.isPinned?0:1)+')">'+(it.isPinned? '取消置顶':'置顶')+'</button> '
                + '<button class="button small" onclick="doFeature('+it.id+','+(it.isFeatured?0:1)+')">'+(it.isFeatured? '取消加精':'加精')+'</button> '
                + '<button class="button small" onclick="viewReplies('+it.id+')">查看回复</button> '
                + '<button class="button small" onclick="recount('+it.id+')">重算回复数</button>'
                + '</div></div>';
        }
        $('#list').html(html);
    }

    function viewReplies(postId){
        currentPostId = postId;
        $.get('/forum/admin/replies',{postId:postId}, function(res){
            if(res && res.code==200){
                var list=res.data || [];
                var html='';
                for(var i=0;i<list.length;i++){
                    var r=list[i];
                    html += '<div style="padding:8px;border-top:1px dashed #eee;">'+
                        '<div><b>'+(r.nickname||r.username||('用户'+r.userId))+'</b> <span style="color:#999;font-size:12px;">'+(r.createdAt||'')+'</span></div>'+
                        '<div style="margin-top:6px;">'+(r.content||'')+'</div>'+
                        '<div style="margin-top:6px">'+
                        '<button class="button small" onclick="replyStatus('+r.id+',1)">隐藏</button> '
                        + '<button class="button small" onclick="replyStatus('+r.id+',0)">恢复</button>'
                        + '</div></div>';
                }
                $('#replyList').html(html);
                $('#replies').show();
            }
        });
    }

    function replyStatus(id,s){
        $.post('/forum/admin/reply/status',{id:id,status:s}, function(res){
            if(res && res.code==200){
                if(currentPostId) viewReplies(currentPostId);
                search();
            } else toast('失败');
        });
    }

    function recount(postId){
        $.post('/forum/admin/post/recount',{postId:postId}, function(res){
            if(res && res.code==200){
                toast('已重算', 'success');
                search();
            } else {
                toast('重算失败');
            }
        });
    }

    function loadPage(currPage, perPage){
        var kw=$('#keyword').val();
        $.ajax({
            url:'/forum/admin/list/page',
            type:'POST',
            contentType:'application/json',
            data: JSON.stringify({currPage: currPage, pageSize: perPage, keyword: kw}),
            success:function(res){
                if(res && res.code==200){
                    var p=res.data;
                    render(p.list||[]);
                    var total=p.total||0; var pageSize=p.pageSize||20; var pageCount=Math.ceil(total/pageSize);
                    javaex.page({ id:'page', pageCount: pageCount, currentPage: p.currPage, perPageCount: pageSize, totalNum: total, position:'center', callback:function(r){ loadPage(r.pageNum, r.perPageCount); } });
                }
            }
        });
    }

    function loadReports(){
        $.get('/forum/admin/report/list', {status: $('#reportStatus').val() || '', keyword: $('#keyword').val() || ''}, function(res){
            if(!(res && res.code==200)){ return; }
            var list = res.data || [];
            if(!list.length){
                $('#reportList').html('<div style="color:#999;">暂无举报记录</div>');
                return;
            }
            var html='';
            for(var i=0;i<list.length;i++){
                var it = list[i] || {};
                var statusText = (it.status==0?'待处理':(it.status==1?'已通过':'已驳回'));
                html += '<div style="padding:10px;border-top:1px dashed #eee;">'
                    + '<div><b>帖子：</b>'+(it.postTitle||'-')+' <span style="margin-left:10px;color:#999;">分类:'+(it.category||'综合')+'</span></div>'
                    + '<div style="margin-top:4px;"><b>举报人：</b>'+(it.reporterNickname||it.reporterUsername||('用户'+(it.userId||'')))+' <b style="margin-left:10px;">状态：</b>'+statusText+'</div>'
                    + '<div style="margin-top:4px;"><b>原因：</b>'+(it.reason||'-')+'</div>'
                    + '<div style="margin-top:6px;">'
                    + '<button class="button small" onclick="handleReport('+it.id+',1)">通过</button> '
                    + '<button class="button small" onclick="handleReport('+it.id+',2)">驳回</button>'
                    + '</div>'
                    + '</div>';
            }
            $('#reportList').html(html);
        });
    }

    function submitHandleReport(){
        var note = $.trim($('#reportHandleNote').val() || '');
        $.post('/forum/admin/report/handle',{id:pendingReportId,status:pendingReportStatus,handleNote:note}, function(res){
            if(res && res.code==200){
                toast('处理成功', 'success');
                loadReports();
            } else {
                toast((res && res.msg) || '处理失败');
            }
        });
    }

    function handleReport(id, status){
        pendingReportId = id;
        pendingReportStatus = status;
        var hint = status===1 ? '处理备注（可选）' : '驳回备注（可选）';
        var html = '<div style="padding:4px 0 0;">'
            + '<textarea id="reportHandleNote" class="desc" style="height:120px;" placeholder="'+hint+'"></textarea>'
            + '</div>';
        javaex.alert({
            title: status===1 ? '通过举报' : '驳回举报',
            content: html,
            width: 520,
            callback: 'submitHandleReport()'
        });
    }

    function search(){ loadPage(1,20); loadReports(); }
    function doStatus(id,s){ $.post('/forum/admin/status',{id:id,status:s},function(res){ if(res && res.code==200) search(); else toast('失败'); }); }
    function doPin(id,p){ $.post('/forum/admin/pin',{id:id,isPinned:p},function(res){ if(res && res.code==200) search(); else toast('失败'); }); }
    function doFeature(id,f){ $.post('/forum/admin/feature',{id:id,isFeatured:f},function(res){ if(res && res.code==200) search(); else toast('失败'); }); }

    $(document).ready(function(){ loadPage(1,20); loadReports(); });
</script>
</body>
</html>
