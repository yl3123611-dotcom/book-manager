<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link href="../javaex/pc/css/icomoon.css" rel="stylesheet" />
    <link href="../javaex/pc/css/animate.css" rel="stylesheet" />
    <link href="../javaex/pc/css/common.css" rel="stylesheet" />
    <link href="../javaex/pc/css/skin/tina.css" rel="stylesheet" />
    <link href="../javaex/pc/css/module-theme.css" rel="stylesheet" />
    <script src="../javaex/pc/lib/jquery-1.7.2.min.js"></script>
    <script src="../javaex/pc/js/common.js"></script>
    <script src="../javaex/pc/js/javaex.min.js"></script>
    <title>我的通知</title>
    <style>
        body { background-color: #f0f2f5; padding: 20px; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
        .block {
            background: #fff;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.06);
            border: none;
            min-height: 600px;
        }
        .block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e8e8e8;
        }
        .block-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            display: flex;
            align-items: center;
        }
        .block-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 18px;
            background: #1890ff;
            margin-right: 8px;
            border-radius: 2px;
        }
        .filters {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .badge {
            display: inline-block;
            background: #ff4d4f;
            color: #fff;
            border-radius: 10px;
            padding: 0 8px;
            font-size: 12px;
            font-weight: normal;
            margin-left: 8px;
            line-height: 20px;
        }
        /* Table Styles */
        .table { width: 100%; border-collapse: collapse; }
        .table thead th {
            background-color: #fafafa;
            color: #595959;
            font-weight: 600;
            padding: 16px;
            border-bottom: 1px solid #e8e8e8;
            text-align: left;
        }
        .table tbody td {
            padding: 16px;
            border-bottom: 1px solid #e8e8e8;
            color: #595959;
        }
        .table tbody tr:hover { background-color: #fafafa; }

        /* Custom styles for notify content */
        .content { max-width: 600px; line-height: 1.6; }
        .notify-time { color: #8c8c8c; font-size: 13px; }

        .breadcrumb { margin-bottom: 16px; color: #595959; }
        .breadcrumb span { margin: 0 4px; }
        .breadcrumb .active { color: #1890ff; font-weight: 500; }

        /* Button overrides */
        .button { border-radius: 4px; height: 32px; line-height: 30px; padding: 0 15px; }
        .select { height: 32px; border-radius: 4px; border: 1px solid #d9d9d9; padding: 0 10px; }
    </style>
</head>
<body class="module-theme">
<div class="breadcrumb">
    <span>通知中心</span>
    <span>/</span>
    <span class="active">我的通知</span>
</div>

<div class="block">
    <div class="block-header">
        <div class="block-title">
            我的通知
            <span id="unread" class="badge" style="display:none;">0</span>
        </div>
        <div class="filters">
            <select id="status" class="select" onchange="loadList()">
                <option value="">全部状态</option>
                <option value="0">未读</option>
                <option value="1">已读</option>
            </select>
            <button class="button blue" onclick="loadList()"><span class="icon-search" style="margin-right:4px;"></span>刷新</button>
            <button class="button green" onclick="readAll()"><span class="icon-check" style="margin-right:4px;"></span>全部已读</button>
        </div>
    </div>

    <table class="table">
        <thead>
        <tr>
            <th style="width:180px;">时间</th>
            <th>通知内容</th>
            <th>内容</th>
            <th style="width:80px;">状态</th>
            <th style="width:120px;">操作</th>
        </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

    <div style="margin-top:10px;color:#999;">
        管理员/调试：<button class="button yellow empty" onclick="gen()">生成借阅提醒</button>
    </div>
</div>

<script>
    $(function(){
        loadUnread();
        loadList();
    });

    function loadUnread(){
        $.get('/notify/unreadCount', function(res){
            if(res.code===200){
                if(res.data>0){ $('#unread').text(res.data).show(); }
                else{ $('#unread').hide(); }
            }
        });
    }

    function loadList(){
        var s = $('#status').val();
        var url = '/notify/my';
        if(s!=="") url += '?status='+s;

        $.get(url, function(res){
            if(res.code!==200){
                javaex.message({content: res.msg || '加载失败', type:'error'});
                return;
            }
            var list = res.data || [];
            var html = '';
            $.each(list, function(_, n){
                html += "<tr align='center'>";
                html += "<td>"+ (n.createdAt || '') +"</td>";
                html += "<td>"+ (n.title || '-') +"<div class='type'>"+(n.type||'')+"</div></td>";
                html += "<td align='left' class='content'>"+ (n.content || '') +"</td>";
                html += "<td>"+ (n.status===1?'已读':'未读') +"</td>";
                if(n.status===0){
                    html += "<td><button class='button blue empty' onclick='read("+n.id+")'>已读</button></td>";
                }else{
                    html += "<td>-</td>";
                }
                html += "</tr>";
            });
            $('#tbody').html(html);
            loadUnread();
        });
    }

    function read(id){
        $.post('/notify/read', {id:id}, function(res){
            if(res.code===200){ javaex.message({content:'已标记', type:'success'}); loadList(); }
            else{ javaex.message({content:res.msg||'操作失败', type:'error'}); }
        });
    }

    function readAll(){
        $.post('/notify/readAll', function(res){
            if(res.code===200){ javaex.message({content:'已全部标记为已读', type:'success'}); loadList(); }
            else{ javaex.message({content:res.msg||'操作失败', type:'error'}); }
        });
    }

    function gen(){
        $.post('/notify/genBorrow?dueDays=1', function(res){
            if(res.code===200){ javaex.message({content:'生成完成，新建：'+res.data, type:'success'}); loadList(); }
            else{ javaex.message({content:res.msg||'生成失败', type:'error'}); }
        });
    }
</script>
</body>
</html>
