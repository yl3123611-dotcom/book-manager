<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link href="../javaex/pc/css/common.css" rel="stylesheet" />
    <link href="../javaex/pc/css/skin/tina.css" rel="stylesheet" />
    <script src="../javaex/pc/lib/jquery-1.7.2.min.js"></script>
    <script src="../javaex/pc/js/javaex.min.js"></script>
    <title>我的通知</title>
    <style>
        body{background:#f5f7fa;padding:12px;}
        .card{background:#fff;border-radius:8px;padding:16px;}
        .filters{display:flex;gap:10px;align-items:center;margin-bottom:12px;}
        .badge{display:inline-block;background:#ff4d4f;color:#fff;border-radius:10px;padding:0 8px;font-size:12px;margin-left:6px;}
        .content{max-width:760px;white-space:normal;}
        .type{font-size:12px;color:#888;}
    </style>
</head>
<body>
<div class="card">
    <div class="filters">
        <h2 style="margin:0;">我的通知<span id="unread" class="badge" style="display:none;"></span></h2>
        <div style="flex:1"></div>
        <select id="status" class="select">
            <option value="">全部</option>
            <option value="0">未读</option>
            <option value="1">已读</option>
        </select>
        <button class="button blue" onclick="loadList()">刷新</button>
        <button class="button green" onclick="readAll()">全部已读</button>
    </div>

    <table class="table color2">
        <thead>
        <tr align="center">
            <th style="width:160px;">时间</th>
            <th style="width:160px;">标题</th>
            <th>内容</th>
            <th style="width:80px;">状态</th>
            <th style="width:120px;">操作</th>
        </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

    <div style="margin-top:10px;color:#999;">
        管理员/调试：<button class="button yellow empty" onclick="gen()">生成借阅提醒</button>
    </div>
</div>

<script>
    $(function(){
        loadUnread();
        loadList();
    });

    function loadUnread(){
        $.get('/notify/unreadCount', function(res){
            if(res.code===200){
                if(res.data>0){ $('#unread').text(res.data).show(); }
                else{ $('#unread').hide(); }
            }
        });
    }

    function loadList(){
        var s = $('#status').val();
        var url = '/notify/my';
        if(s!=="") url += '?status='+s;

        $.get(url, function(res){
            if(res.code!==200){
                javaex.message({content: res.msg || '加载失败', type:'error'});
                return;
            }
            var list = res.data || [];
            var html = '';
            $.each(list, function(_, n){
                html += "<tr align='center'>";
                html += "<td>"+ (n.createdAt || '') +"</td>";
                html += "<td>"+ (n.title || '-') +"<div class='type'>"+(n.type||'')+"</div></td>";
                html += "<td align='left' class='content'>"+ (n.content || '') +"</td>";
                html += "<td>"+ (n.status===1?'已读':'未读') +"</td>";
                if(n.status===0){
                    html += "<td><button class='button blue empty' onclick='read("+n.id+")'>已读</button></td>";
                }else{
                    html += "<td>-</td>";
                }
                html += "</tr>";
            });
            $('#tbody').html(html);
            loadUnread();
        });
    }

    function read(id){
        $.post('/notify/read', {id:id}, function(res){
            if(res.code===200){ javaex.message({content:'已标记', type:'success'}); loadList(); }
            else{ javaex.message({content:res.msg||'操作失败', type:'error'}); }
        });
    }

    function readAll(){
        $.post('/notify/readAll', function(res){
            if(res.code===200){ javaex.message({content:'已全部标记为已读', type:'success'}); loadList(); }
            else{ javaex.message({content:res.msg||'操作失败', type:'error'}); }
        });
    }

    function gen(){
        $.post('/notify/genBorrow?dueDays=1', function(res){
            if(res.code===200){ javaex.message({content:'生成完成，新建：'+res.data, type:'success'}); loadList(); }
            else{ javaex.message({content:res.msg||'生成失败', type:'error'}); }
        });
    }
</script>
</body>
</html>
