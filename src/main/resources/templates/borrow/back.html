<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>
<head>
    <meta charset="utf-8">
    <link href="../../javaex/pc/css/icomoon.css" rel="stylesheet" />
    <link href="../../javaex/pc/css/animate.css" rel="stylesheet" />
    <link href="../../javaex/pc/css/common.css" rel="stylesheet" />
    <link href="../../javaex/pc/css/skin/tina.css" rel="stylesheet" />
    <script src="../../javaex/pc/lib/jquery-1.7.2.min.js"></script>
    <script src="../../javaex/pc/js/common.js"></script>
    <script src="../../javaex/pc/js/javaex.min.js"></script>
    <script src="../../javaex/pc/js/javaex-formVerify.js"></script>
    <title>图书归还</title>
    <style>
        body { background-color: #f0f2f5; padding: 20px;}
        .block {
            background: #fff;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.06);
            border: none;
        }
        .banner {
            border-bottom: 1px solid #f0f0f0;
            margin-bottom: 24px;
            padding-bottom: 16px;
        }
        .banner .tab.fixed {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            border-left: none;
            padding-left: 0;
            display: inline-block;
        }
        .banner .tab.fixed::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 18px;
            background: #1890ff;
            margin-right: 8px;
            vertical-align: text-bottom;
            border-radius: 2px;
        }

        .unit { margin: 16px 0; display: inline-block; width: 48%; vertical-align: top;}
        .unit .left { width: 80px !important; text-align: right; font-weight: 500; color: #666; font-size: 14px;}
        .unit .right { width: calc(100% - 100px); }
        .unit .right input.text { width: 100%; background: #f5f5f5; border-color: #d9d9d9; cursor: not-allowed; color: #555; }

        .section-title {
            margin-top: 20px;
            margin-bottom: 16px;
            font-size: 16px;
            font-weight: 600;
            color: #333;
            border-left: 4px solid #faad14;
            padding-left: 10px;
        }

        /* Table overrides */
        .table thead th {
            background-color: #fafafa;
            color: #595959;
            font-weight: 600;
            border-bottom: 1px solid #f0f0f0;
            height: 48px;
        }
        .table tbody td {
            color: #666;
            border-bottom: 1px solid #f0f0f0;
            height: 48px;
        }
    </style>
</head>

<body>
<div class="list-content">
	<div class="block">
		<div class="banner">
			<p class="tab fixed">图书归还</p>
		</div>
	
		<!--正文内容-->
		<div class="main" style="padding:0;">
             <!-- 用户信息区域 -->
             <div style="background: #fafafa; padding: 20px; border-radius: 4px; margin-bottom: 24px;">
                <div class="unit">
                    <div class="left"><p class="subtitle">用户名</p></div>
                    <div class="right">
                        <input type="text" class="text" id="username" readonly />
                    </div>
                </div>
                <div class="unit">
                    <div class="left"><p class="subtitle">昵称</p></div>
                    <div class="right">
                        <input type="text" class="text" id="nickname" readonly />
                    </div>
                </div>

				<div class="unit">
					<div class="left"><p class="subtitle">身份</p></div>
					<div class="right">
						<input type="text" class="text" name="identity" id="identity" readonly />
					</div>
				</div>

				<div class="unit">
					<div class="left"><p class="subtitle">可借数量</p></div>
					<div class="right">
						<input type="text" class="text" name="size" id="size" readonly />
					</div>
				</div>
             </div>

			<div class="section-title">已借阅图书列表</div>

			<table id="table" class="table">
				<thead>
				<tr>
					<th style="width:60px; text-align:center;">序号</th>
					<th>书名</th>
					<th>作者</th>
					<th>ISBN</th>
					<th>借阅时间</th>
					<th>应还时间</th>
					<th>状态</th>
					<th style="width: 100px; text-align:center;">操作</th>
				</tr>
				</thead>
				<tbody id="tbody">
				</tbody>
			</table>
		</div>
	</div>
</div>

<script>
    $(document).ready(function(){
			// 1. 查询当前用户
			$.get("/user/currUser", function(data){
				var user = data.data;
				$("#username").val(user.username);
				$("#nickname").val(user.nickname);
				$("#identity").val(user.ident);
				$("#size").val(user.size);

				// 2. 查询借阅列表
				$.get("/borrow/borrowed", {"userId": user.id}, function(result){
					var text = "";
					var backArray = result.data;

					$.each(backArray, function(index, value){
						var num = index + 1;
                        // 逾期判断
						var statusHtml = value.late=='是' ? '<span style="color:#ff4d4f;">已逾期</span>' : '<span style="color:#52c41a;">正常</span>';

						text += "<tr>"
								+ "<td style='text-align:center;'>"+num+"</td>"
								+ "<td><span style='font-weight:600;color:#333;'>"+value.name+"</span></td>"
								+ "<td>"+value.author+"</td>"
								+ "<td>"+value.isbn+"</td>"
								+ "<td>"+value.borrowTime+"</td>"
								+ "<td>"+value.endTime+"</td>"
								+ "<td>"+statusHtml+"</td>"
								+ "<td style='text-align:center;'>"
								+ "<button class='button blue action-btn' style='padding:0 12px; height:28px; line-height:26px;' onclick='retBook("+value.borrowId+")'>归还</button>"
								+ "</td></tr>";
					});

					$("#tbody").html(text);
				});
			});
		});

		// 3. 归还操作（只传 borrowId）
		function retBook(borrowId) {
			$.post("/borrow/ret", { borrowId: borrowId }, function(result){
				if (result.code == 200) {
					alert("归还成功！");
					location.reload();
				} else {
					alert(result.msg || "归还失败");
				}
			}, "json");
		}
	</script>

</body>
</html>
