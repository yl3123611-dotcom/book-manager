<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="../../javaex/pc/css/common.css" rel="stylesheet" />
  <link href="../../javaex/pc/css/skin/tina.css" rel="stylesheet" />
  <script src="../../javaex/pc/lib/jquery-1.7.2.min.js"></script>
  <script src="../../javaex/pc/js/javaex.min.js"></script>
  <title>热门推荐管理</title>
  <style>
    body{background:#f5f7fa;padding:12px;}
    .card{background:#fff;border-radius:8px;padding:16px;margin-bottom:12px;}
    .row{display:flex;gap:10px;align-items:center;margin-bottom:10px;}
    .img{width:40px;height:55px;object-fit:cover;border:1px solid #eee;border-radius:4px;}
  </style>
</head>
<body>

<div class="card">
  <h2>已推荐列表</h2>
  <table class="table color2">
    <thead>
    <tr align="center">
      <th>bookId</th>
      <th>操作</th>
    </tr>
    </thead>
    <tbody id="recBody"></tbody>
  </table>
</div>

<div class="card">
  <h2>搜索图书并加入推荐</h2>
  <div class="row">
    <input id="keyword" class="text" placeholder="输入书名/作者关键字" style="width:280px;">
    <button class="button blue" onclick="search()">搜索</button>
  </div>
  <table class="table color2">
    <thead>
    <tr align="center">
      <th>封面</th>
      <th>书名</th>
      <th>作者</th>
      <th>操作</th>
    </tr>
    </thead>
    <tbody id="bookBody"></tbody>
  </table>
</div>

<script>
  $(function(){ loadRecs(); });

  function loadRecs(){
    $.get("/admin/recommend/list", function(res){
      var list = res.data || [];
      var html = "";
      $.each(list, function(_, r){
        html += "<tr align='center'>";
        html += "<td>"+ r.bookId +"</td>";
        html += "<td><button class='button red empty' onclick='removeRec("+r.bookId+")'>移除</button></td>";
        html += "</tr>";
      });
      $("#recBody").html(html);
    });
  }

  function removeRec(bookId){
    $.get("/admin/recommend/remove", {bookId:bookId}, function(res){
      if(res.code===200){ javaex.message({content:"移除成功", type:"success"}); loadRecs(); }
      else{ javaex.message({content:res.msg||"移除失败", type:"error"}); }
    });
  }

  function search(){
    var keyword = $("#keyword").val();
    $.ajax({
      url: "/book/list",
      type: "POST",
      contentType:"application/json;charset=UTF-8",
      data: JSON.stringify({currPage:1, pageSize:10, keyword:keyword}),
      success: function(res){
        var page = res.data;
        var list = page.list || [];
        var html = "";
        $.each(list, function(_, b){
          var cover = b.cover ? (b.cover.indexOf("/")===0 ? b.cover : ("/"+b.cover)) : "/javaex/img/1.jpg";
          html += "<tr align='center'>";
          html += "<td><img class='img' src='"+cover+"' onerror=\"this.src='/javaex/img/1.jpg'\"></td>";
          html += "<td>"+ b.name +"</td>";
          html += "<td>"+ b.author +"</td>";
          html += "<td><button class='button green empty' onclick='addRec("+b.id+")'>加入推荐</button></td>";
          html += "</tr>";
        });
        $("#bookBody").html(html);
      }
    });
  }

  function addRec(bookId){
    $.ajax({
      url: "/admin/recommend/add?bookId="+bookId,
      type: "POST",
      success: function(res){
        if(res.code===200){
          javaex.message({content:"加入成功", type:"success"});
          loadRecs();
        }else{
          javaex.message({content:res.msg||"加入失败(可能已存在)", type:"error"});
        }
      }
    });
  }
</script>
</body>
</html>
