<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>
<head>
    <meta charset="utf-8">
    <link href="../javaex/pc/css/icomoon.css" rel="stylesheet" />
    <link href="../javaex/pc/css/animate.css" rel="stylesheet" />
    <link href="../javaex/pc/css/common.css" rel="stylesheet" />
    <link href="../javaex/pc/css/skin/tina.css" rel="stylesheet" />
    <link href="../javaex/pc/css/module-theme.css" rel="stylesheet" />
    <script src="../javaex/pc/lib/jquery-1.7.2.min.js"></script>
    <script src="../javaex/pc/js/common.js"></script>
    <script src="../javaex/pc/js/javaex.min.js"></script>
    <title>公告列表</title>
    <style>
        body { background-color: #f0f2f5; padding: 20px; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
        .block { background: #fff; padding: 24px; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.06); min-height: 600px; }
        .block-header { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #e8e8e8; }
        .block-title { font-size: 18px; font-weight: 600; color: #333; display: flex; align-items: center; }
        .block-title::before { content: ''; display: inline-block; width: 4px; height: 18px; background: #1890ff; margin-right: 8px; border-radius: 2px; }

        .ann-list { margin-top: 10px; }
        .ann-item { padding: 16px; border-bottom: 1px solid #f0f0f0; transition: all 0.3s; border-radius: 4px; }
        .ann-item:hover { background-color: #fafafa; }
        .ann-item:last-child { border-bottom: none; }
        .ann-item.active .icon-arrow { transform: rotate(180deg); }

        .ann-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .ann-title { font-size: 16px; font-weight: 500; color: #262626; cursor: pointer; display: flex; align-items: center; }
        .ann-title:hover { color: #1890ff; }
        .ann-time { color: #8c8c8c; font-size: 13px; }
        .icon-arrow { margin-left: 8px; font-size: 12px; color: #ccc; transition: transform 0.3s; }
        .ann-content { color: #595959; margin-top: 12px; line-height: 1.8; display: none; padding-top: 12px; border-top: 1px dashed #f0f0f0; }

        .breadcrumb { margin-bottom: 16px; color: #595959; }
        .breadcrumb span { margin: 0 4px; }
        .breadcrumb .active { color: #1890ff; font-weight: 500; }

        .empty { padding: 40px; text-align: center; color: #8c8c8c; }
        .badge-top { background: #ff4d4f; color: #fff; font-size: 12px; padding: 1px 6px; border-radius: 4px; margin-right: 8px; font-weight: normal; }
    </style>
</head>
<body class="module-theme">
<div class="breadcrumb">
    <span>公告管理</span>
    <span>/</span>
    <span class="active">公告列表</span>
</div>

<div class="block">
    <div class="block-header">
        <div class="block-title">公告列表</div>
    </div>

    <div id="annList" class="ann-list"></div>
    <div id="annEmpty" class="empty" style="display:none;">
        <span class="icon-inbox" style="font-size:48px;display:block;margin-bottom:16px;color:#e8e8e8;"></span>
        暂无公告
    </div>
</div>

<script>
    function escapeHtml(s){
        if(s === null || s === undefined) return '';
        return String(s)
            .replace(/&/g,'&amp;')
            .replace(/</g,'&lt;')
            .replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;')
            .replace(/'/g,'&#39;');
    }

    function fmtTime(t){
        if(!t) return '';
        return String(t).replace('T',' ').substring(0,19);
    }

    function render(list){
        var $box = $("#annList");
        $box.empty();
        if(!list || list.length === 0){
            $("#annEmpty").show();
            return;
        }
        $("#annEmpty").hide();

        for(var i=0;i<list.length;i++){
            var a = list[i];
            var html = '';
            html += '<div class="ann-item">';
            html += '  <div class="ann-header">';
            html += '    <div class="ann-title">' + ((a.pinned == 1) ? '<span class="badge-top">置顶</span>' : '') + escapeHtml(a.title || '') + '<i class="icon-arrow">▼</i></div>';
            html += '    <div class="ann-time">发布时间：' + escapeHtml(fmtTime(a.publishTime)) + '</div>';
            html += '  </div>';
            html += '  <div class="ann-content">' + escapeHtml(a.content || '').replace(/\n/g,'<br/>') + '</div>';
            html += '</div>';
            $box.append(html);
        }

        $box.find('.ann-title').off('click').on('click', function(){
            var $item = $(this).closest('.ann-item');
            $item.toggleClass('active');
            $item.find('.ann-content').stop(true, true).slideToggle(120);
        });
    }

    $(function(){
        $.get('/announcement/top?limit=20', function(res){
            if(res && res.code === 200){
                render(res.data);
            }else{
                render([]);
            }
        });
    });
</script>
</body>
</html>
